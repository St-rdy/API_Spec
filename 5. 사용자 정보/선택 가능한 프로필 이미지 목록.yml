info:
  name: 선택 가능한 프로필 이미지 목록
  type: http
  seq: 5

http:
  method: GET
  url: "{{base_url}}/api/v1/users/profile-images"
  headers:
    - name: Authorization
      value: Bearer {{access_token}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 - 목록 조회 성공
    request:
      url: "{{base_url}}/api/v1/users/profile-images"
      method: GET
      headers:
        - name: Authorization
          value: Bearer eyJhbGciOiJIUzI1NiJ9.EXAMPLE
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "images": [
              {
                "id": 1,
                "url": "https://cdn.example.com/profiles/1.png"
              },
              {
                "id": 2,
                "url": "https://cdn.example.com/profiles/2.png"
              },
              {
                "id": 3,
                "url": "https://cdn.example.com/profiles/3.png"
              }
            ]
          }

docs: |-
  ## 선택 가능한 프로필 이미지 목록 조회

  사용자가 프로필 이미지를 변경할 때 선택할 수 있는 이미지 목록을 반환합니다.

  ### 이미지 정책
  - 서버에 미리 등록된 이미지 중에서만 선택 가능
  - 직접 업로드 불가
  - 목록에 없는 URL로 수정 요청 시 400 에러 반환
