info:
  name: 연결된 소셜 목록 조회
  type: http
  seq: 4

http:
  method: GET
  url: "{{base_url}}/api/v1/users/me/providers"
  headers:
    - name: Authorization
      value: Bearer {{access_token}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 - 조회 성공
    request:
      url: "{{base_url}}/api/v1/users/me/providers"
      method: GET
      headers:
        - name: Authorization
          value: Bearer eyJhbGciOiJIUzI1NiJ9.EXAMPLE
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "providers": [
              {
                "provider": "google",
                "connectedAt": "2026-01-01T00:00:00"
              },
              {
                "provider": "kakao",
                "connectedAt": "2026-02-01T00:00:00"
              }
            ]
          }
  - name: 401 - AT 만료
    request:
      url: "{{base_url}}/api/v1/users/me/providers"
      method: GET
      headers:
        - name: Authorization
          value: Bearer eyJhbGciOiJIUzI1NiJ9.EXAMPLE
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": "TOKEN_EXPIRED",
            "message": "Access Token이 만료되었습니다.",
            "timestamp": "2026-03-01T12:00:00"
          }

docs: |-
  ## 연결된 소셜 목록 조회

  현재 로그인한 사용자의 소셜 연동 목록을 반환합니다.

  ### 실패 응답
  | Status | error | 상황 | 프론트 처리 |
  |---|---|---|---|
  | 401 | TOKEN_EXPIRED | AT 만료 | refresh 후 재시도 |
  | 401 | UNAUTHORIZED | AT 없음 | 로그인 페이지 이동 |
