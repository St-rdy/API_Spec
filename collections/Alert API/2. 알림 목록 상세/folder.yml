docs:
  content: |-
    ## 알림 목록 / 상세 API

    사용자가 받은 알림 목록 조회, 읽음 처리, 삭제를 수행하는 API입니다.

    ### 알림 타입
    | type | 설명 |
    |---|---|
    | chat | 채팅 메시지 수신 알림 |
    | study | 스터디 초대 등 스터디 관련 알림 |
    | system | 시스템 공지 알림 |

    ### 인증 필요 여부
    ✅ 모든 API에 인증 필요 (Authorization: Bearer {AT})
  type: text/markdown
