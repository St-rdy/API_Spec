info:
  name: 2-1. 알림 목록 조회
  type: http
  seq: 1

http:
  method: GET
  url: "{{base_url}}/api/v1/notifications"
  headers:
    - name: Authorization
      value: Bearer {{access_token}}
      description: Access Token
  params:
    query:
      - name: type
        value: ""
        description: 알림 타입 필터 (chat, study, system)
        enabled: false
      - name: is_read
        value: ""
        description: 읽음 여부 (true / false)
        enabled: false
      - name: page
        value: "1"
        description: 페이지 번호 (기본값 1)
        enabled: true
      - name: limit
        value: "20"
        description: 페이지당 항목 수 (기본값 20)
        enabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 - 목록 조회 성공
    request:
      url: "{{base_url}}/api/v1/notifications?page=1&limit=20"
      method: GET
      headers:
        - name: Authorization
          value: Bearer eyJhbGciOiJIUzI1NiJ9.EXAMPLE
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "status": 200,
            "code": "SUCCESS",
            "message": "알림 목록을 성공적으로 가져왔습니다.",
            "data": {
              "unread_count": 3,
              "pagination": { "page": 1, "limit": 20, "total": 45 },
              "notifications": [
                {
                  "id": 10,
                  "type": "chat",
                  "title": "새 메시지가 도착했어요",
                  "body": "김철수님이 메시지를 보냈습니다.",
                  "is_read": false,
                  "url": "/chat/room/5",
                  "created_at": "2025-02-25T10:00:00Z"
                },
                {
                  "id": 9,
                  "type": "study",
                  "title": "스터디 초대",
                  "body": "알고리즘 스터디에 초대되었습니다.",
                  "is_read": true,
                  "url": "/study/group/12",
                  "created_at": "2025-02-24T09:00:00Z"
                }
              ]
            }
          }
  - name: 200 - 타입 필터 조회 (chat)
    request:
      url: "{{base_url}}/api/v1/notifications?type=chat&is_read=false&page=1&limit=20"
      method: GET
      headers:
        - name: Authorization
          value: Bearer eyJhbGciOiJIUzI1NiJ9.EXAMPLE
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "status": 200,
            "code": "SUCCESS",
            "message": "알림 목록을 성공적으로 가져왔습니다.",
            "data": {
              "unread_count": 1,
              "pagination": { "page": 1, "limit": 20, "total": 1 },
              "notifications": [
                {
                  "id": 10,
                  "type": "chat",
                  "title": "새 메시지가 도착했어요",
                  "body": "김철수님이 메시지를 보냈습니다.",
                  "is_read": false,
                  "url": "/chat/room/5",
                  "created_at": "2025-02-25T10:00:00Z"
                }
              ]
            }
          }
  - name: 401 - 인증 실패
    request:
      url: "{{base_url}}/api/v1/notifications"
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "status": 401,
            "code": "UNAUTHORIZED",
            "message": "인증이 필요합니다.",
            "data": null
          }

docs: |-
  ## 2-1. 알림 목록 조회

  사용자가 받은 알림 목록을 조회합니다. 타입 및 읽음 여부로 필터링하고 페이지네이션을 지원합니다.

  ### 요청 헤더
  | 헤더 | 필수 | 설명 |
  |---|---|---|
  | Authorization | ✅ | `Bearer {accessToken}` |

  ### Query Parameters
  | 파라미터 | 타입 | 기본값 | 설명 |
  |---|---|---|---|
  | type | string | - | 알림 타입 필터 (chat / study / system) |
  | is_read | boolean | - | 읽음 여부 필터 (true / false) |
  | page | number | 1 | 페이지 번호 |
  | limit | number | 20 | 페이지당 항목 수 |

  ### 성공 응답 (200 OK)
  ```json
  {
    "status": 200,
    "code": "SUCCESS",
    "message": "알림 목록을 성공적으로 가져왔습니다.",
    "data": {
      "unread_count": 3,
      "pagination": { "page": 1, "limit": 20, "total": 45 },
      "notifications": [
        {
          "id": 10,
          "type": "chat",
          "title": "새 메시지가 도착했어요",
          "body": "김철수님이 메시지를 보냈습니다.",
          "is_read": false,
          "url": "/chat/room/5",
          "created_at": "2025-02-25T10:00:00Z"
        }
      ]
    }
  }
  ```

  ### 실패 응답
  | Status | code | 메시지 | 발생 원인 |
  |---|---|---|---|
  | 401 | UNAUTHORIZED | 인증이 필요합니다. | 유효하지 않거나 만료된 토큰 |
  | 500 | DB_ERROR | 데이터베이스 조회 중 오류가 발생했습니다. | 서버 내부 DB 오류 |
