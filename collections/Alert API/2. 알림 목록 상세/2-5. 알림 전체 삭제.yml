info:
  name: 2-5. 알림 전체 삭제
  type: http
  seq: 5

http:
  method: DELETE
  url: "{{base_url}}/api/v1/notifications"
  headers:
    - name: Authorization
      value: Bearer {{access_token}}
      description: Access Token
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 - 전체 삭제 성공
    request:
      url: "{{base_url}}/api/v1/notifications"
      method: DELETE
      headers:
        - name: Authorization
          value: Bearer eyJhbGciOiJIUzI1NiJ9.EXAMPLE
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "status": 200,
            "code": "SUCCESS",
            "message": "모든 알림이 삭제되었습니다.",
            "data": {
              "deleted_count": 12
            }
          }
  - name: 401 - 인증 실패
    request:
      url: "{{base_url}}/api/v1/notifications"
      method: DELETE
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "status": 401,
            "code": "UNAUTHORIZED",
            "message": "인증이 필요합니다.",
            "data": null
          }

docs: |-
  ## 2-5. 알림 전체 삭제

  사용자의 모든 알림을 삭제합니다.

  ### 요청 헤더
  | 헤더 | 필수 | 설명 |
  |---|---|---|
  | Authorization | ✅ | `Bearer {accessToken}` |

  ### 성공 응답 (200 OK)
  ```json
  {
    "status": 200,
    "code": "SUCCESS",
    "message": "모든 알림이 삭제되었습니다.",
    "data": {
      "deleted_count": 12
    }
  }
  ```

  `deleted_count`: 삭제된 알림 수 (알림이 없으면 0)

  ### 실패 응답
  | Status | code | 메시지 | 발생 원인 |
  |---|---|---|---|
  | 401 | UNAUTHORIZED | 인증이 필요합니다. | 유효하지 않거나 만료된 토큰 |
  | 500 | DB_ERROR | 데이터베이스 조회 중 오류가 발생했습니다. | 서버 내부 DB 오류 |
