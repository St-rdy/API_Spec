info:
  name: 2-2. 알림 읽음 처리
  type: http
  seq: 2

http:
  method: PATCH
  url: "{{base_url}}/api/v1/notifications/:id/read"
  headers:
    - name: Authorization
      value: Bearer {{access_token}}
      description: Access Token
  params:
    path:
      - name: id
        value: "10"
        description: 읽음 처리할 알림 ID
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 - 읽음 처리 성공
    request:
      url: "{{base_url}}/api/v1/notifications/10/read"
      method: PATCH
      headers:
        - name: Authorization
          value: Bearer eyJhbGciOiJIUzI1NiJ9.EXAMPLE
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "status": 200,
            "code": "SUCCESS",
            "message": "알림을 읽음 처리했습니다.",
            "data": {
              "id": 10,
              "is_read": true
            }
          }
  - name: 404 - 알림 없음
    request:
      url: "{{base_url}}/api/v1/notifications/999/read"
      method: PATCH
      headers:
        - name: Authorization
          value: Bearer eyJhbGciOiJIUzI1NiJ9.EXAMPLE
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "status": 404,
            "code": "NOT_FOUND",
            "message": "알림을 찾을 수 없습니다.",
            "data": null
          }
  - name: 401 - 인증 실패
    request:
      url: "{{base_url}}/api/v1/notifications/10/read"
      method: PATCH
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "status": 401,
            "code": "UNAUTHORIZED",
            "message": "인증이 필요합니다.",
            "data": null
          }

docs: |-
  ## 2-2. 알림 읽음 처리

  특정 알림을 읽음 상태로 변경합니다.

  ### 요청 헤더
  | 헤더 | 필수 | 설명 |
  |---|---|---|
  | Authorization | ✅ | `Bearer {accessToken}` |

  ### Path Parameters
  | 파라미터 | 타입 | 필수 | 설명 |
  |---|---|---|---|
  | id | number | ✅ | 읽음 처리할 알림 ID |

  ### 성공 응답 (200 OK)
  ```json
  {
    "status": 200,
    "code": "SUCCESS",
    "message": "알림을 읽음 처리했습니다.",
    "data": {
      "id": 10,
      "is_read": true
    }
  }
  ```

  ### 실패 응답
  | Status | code | 메시지 | 발생 원인 |
  |---|---|---|---|
  | 401 | UNAUTHORIZED | 인증이 필요합니다. | 유효하지 않거나 만료된 토큰 |
  | 404 | NOT_FOUND | 알림을 찾을 수 없습니다. | 존재하지 않는 알림 id |
  | 500 | DB_ERROR | 데이터베이스 조회 중 오류가 발생했습니다. | 서버 내부 DB 오류 |
