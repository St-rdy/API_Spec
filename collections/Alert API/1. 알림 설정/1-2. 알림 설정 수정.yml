info:
  name: 1-2. 알림 설정 수정
  type: http
  seq: 2

http:
  method: PATCH
  url: "{{base_url}}/api/v1/notifications/settings"
  headers:
    - name: Authorization
      value: Bearer {{access_token}}
      description: Access Token
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "push_enabled": true,
        "chat_enabled": false,
        "study_enabled": true
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 - 수정 성공
    request:
      url: "{{base_url}}/api/v1/notifications/settings"
      method: PATCH
      headers:
        - name: Authorization
          value: Bearer eyJhbGciOiJIUzI1NiJ9.EXAMPLE
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: '{"push_enabled": true, "chat_enabled": false, "study_enabled": true}'
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "status": 200,
            "code": "SUCCESS",
            "message": "알림 설정이 수정되었습니다.",
            "data": {
              "id": 1,
              "user_id": 42,
              "push_enabled": true,
              "chat_enabled": false,
              "study_enabled": true
            }
          }
  - name: 400 - 유효하지 않은 필드값
    request:
      url: "{{base_url}}/api/v1/notifications/settings"
      method: PATCH
      headers:
        - name: Authorization
          value: Bearer eyJhbGciOiJIUzI1NiJ9.EXAMPLE
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: '{"push_enabled": "yes"}'
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "status": 400,
            "code": "INVALID_FIELD",
            "message": "유효하지 않은 필드값입니다.",
            "data": null
          }
  - name: 401 - 인증 실패
    request:
      url: "{{base_url}}/api/v1/notifications/settings"
      method: PATCH
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "status": 401,
            "code": "UNAUTHORIZED",
            "message": "인증이 필요합니다.",
            "data": null
          }
  - name: 500 - DB 오류
    request:
      url: "{{base_url}}/api/v1/notifications/settings"
      method: PATCH
      headers:
        - name: Authorization
          value: Bearer eyJhbGciOiJIUzI1NiJ9.EXAMPLE
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: '{"push_enabled": true}'
    response:
      status: 500
      statusText: Internal Server Error
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "status": 500,
            "code": "DB_ERROR",
            "message": "데이터베이스 조회 중 오류가 발생했습니다.",
            "data": null
          }

docs: |-
  ## 1-2. 알림 설정 수정

  사용자의 알림 설정을 변경합니다. push 알림, 채팅 알림, 스터디 알림의 활성화 여부를 수정할 수 있습니다.

  ### 요청 헤더
  | 헤더 | 필수 | 설명 |
  |---|---|---|
  | Authorization | ✅ | `Bearer {accessToken}` |
  | Content-Type | ✅ | `application/json` |

  ### 요청 Body
  | 필드 | 타입 | 필수 | 설명 |
  |---|---|---|---|
  | push_enabled | boolean | ❌ | Push 알림 활성화 여부 |
  | chat_enabled | boolean | ❌ | 채팅 알림 활성화 여부 |
  | study_enabled | boolean | ❌ | 스터디 알림 활성화 여부 |

  ```json
  {
    "push_enabled": true,
    "chat_enabled": false,
    "study_enabled": true
  }
  ```

  ### 성공 응답 (200 OK)
  ```json
  {
    "status": 200,
    "code": "SUCCESS",
    "message": "알림 설정이 수정되었습니다.",
    "data": {
      "id": 1,
      "user_id": 42,
      "push_enabled": true,
      "chat_enabled": false,
      "study_enabled": true
    }
  }
  ```

  ### 실패 응답
  | Status | code | 메시지 | 발생 원인 |
  |---|---|---|---|
  | 400 | INVALID_FIELD | 유효하지 않은 필드값입니다. | boolean 외 다른 값이 전달된 경우 |
  | 401 | UNAUTHORIZED | 인증이 필요합니다. | 유효하지 않거나 만료된 토큰 |
  | 500 | DB_ERROR | 데이터베이스 조회 중 오류가 발생했습니다. | 서버 내부 DB 오류 |
