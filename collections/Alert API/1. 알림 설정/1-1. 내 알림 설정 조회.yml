info:
  name: 1-1. 내 알림 설정 조회
  type: http
  seq: 1

http:
  method: GET
  url: "{{base_url}}/api/v1/notifications/settings"
  headers:
    - name: Authorization
      value: Bearer {{access_token}}
      description: Access Token
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 - 조회 성공
    request:
      url: "{{base_url}}/api/v1/notifications/settings"
      method: GET
      headers:
        - name: Authorization
          value: Bearer eyJhbGciOiJIUzI1NiJ9.EXAMPLE
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "status": 200,
            "code": "SUCCESS",
            "message": "알림 설정을 성공적으로 가져왔습니다.",
            "data": {
              "id": 1,
              "user_id": 42,
              "push_enabled": true,
              "chat_enabled": true,
              "study_enabled": false
            }
          }
  - name: 401 - 인증 실패
    request:
      url: "{{base_url}}/api/v1/notifications/settings"
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "status": 401,
            "code": "UNAUTHORIZED",
            "message": "인증이 필요합니다.",
            "data": null
          }
  - name: 500 - DB 오류
    request:
      url: "{{base_url}}/api/v1/notifications/settings"
      method: GET
      headers:
        - name: Authorization
          value: Bearer eyJhbGciOiJIUzI1NiJ9.EXAMPLE
    response:
      status: 500
      statusText: Internal Server Error
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "status": 500,
            "code": "DB_ERROR",
            "message": "데이터베이스 조회 중 오류가 발생했습니다.",
            "data": null
          }

docs: |-
  ## 1-1. 내 알림 설정 조회

  사용자의 알림 설정을 조회합니다. push 알림, 채팅 알림, 스터디 알림 설정을 확인할 수 있습니다.

  ### 요청 헤더
  | 헤더 | 필수 | 설명 |
  |---|---|---|
  | Authorization | ✅ | `Bearer {accessToken}` |

  ### 성공 응답 (200 OK)
  ```json
  {
    "status": 200,
    "code": "SUCCESS",
    "message": "알림 설정을 성공적으로 가져왔습니다.",
    "data": {
      "id": 1,
      "user_id": 42,
      "push_enabled": true,
      "chat_enabled": true,
      "study_enabled": false
    }
  }
  ```

  ### 실패 응답
  | Status | code | 메시지 | 발생 원인 |
  |---|---|---|---|
  | 401 | UNAUTHORIZED | 인증이 필요합니다. | 유효하지 않거나 만료된 토큰 |
  | 500 | DB_ERROR | 데이터베이스 조회 중 오류가 발생했습니다. | 서버 내부 DB 오류 |
