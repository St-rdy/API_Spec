opencollection: 1.0.0

info:
  name: Alert API
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  variables:
    - name: base_url
      value: http://localhost.com
    - name: access_token
      value: ""

docs:
  content: |-
    # Alert API 명세서

    ## 개요

    알림 설정 조회/변경, 알림 목록 및 상세 조회, 알림 생성, Web Push 구독 관리 API입니다.

    ---

    ## 전체 API 목록

    ### 1. 알림 설정

    | 메서드 | URL | 설명 |
    | --- | --- | --- |
    | GET | /api/v1/notifications/settings | 내 알림 설정 조회 |
    | PATCH | /api/v1/notifications/settings | 알림 설정 수정 |

    ### 2. 알림 목록 / 상세

    | 메서드 | URL | 설명 |
    | --- | --- | --- |
    | GET | /api/v1/notifications | 알림 목록 조회 |
    | PATCH | /api/v1/notifications/{id}/read | 알림 읽음 처리 |
    | PATCH | /api/v1/notifications/read-all | 알림 전체 읽음 처리 |
    | DELETE | /api/v1/notifications/{id} | 알림 삭제 |
    | DELETE | /api/v1/notifications | 알림 전체 삭제 |

    ### 3. 알림 생성

    | 메서드 | URL | 설명 |
    | --- | --- | --- |
    | POST | /api/v1/notifications/user | 사용자 알림 생성 |
    | POST | /api/v1/admin/notifications/system | 시스템 알림 생성 (관리자 전용) |

    ### 4. 웹 푸시 구독 관리

    | 메서드 | URL | 설명 |
    | --- | --- | --- |
    | GET | /api/v1/notifications/push/vapid-public-key | VAPID 공개키 조회 |
    | POST | /api/v1/notifications/push/subscribe | Push 구독 등록 |
    | DELETE | /api/v1/notifications/push/unsubscribe | Push 구독 해제 |

    ---

    ## 공통 규칙

    ### 인증 헤더

    인증이 필요한 모든 API에 아래 헤더를 포함해야 합니다.

    ```
    Authorization: Bearer {accessToken}
    ```

    ### 공통 응답 포맷

    ```json
    {
      "status": 200,
      "code": "SUCCESS",
      "message": "메시지",
      "data": {}
    }
    ```

    ### 공통 에러 응답 포맷

    ```json
    {
      "status": 401,
      "code": "UNAUTHORIZED",
      "message": "인증이 필요합니다.",
      "data": null
    }
    ```

    ---

    ## 에러 코드 전체 목록

    | HTTP | code | 메시지 | 발생 시점 |
    | --- | --- | --- | --- |
    | 400 | INVALID_FIELD | 유효하지 않은 필드값입니다. | 잘못된 필드값 전달 |
    | 400 | INVALID_TYPE | 유효하지 않은 타입입니다. | 없는 type값 사용 |
    | 400 | MISSING_FIELDS | 필수 필드가 누락 되었습니다. | 필수 필드 누락 |
    | 401 | UNAUTHORIZED | 인증이 필요합니다. | 유효하지 않거나 만료된 토큰 |
    | 403 | FORBIDDEN | 관리자 권한이 필요합니다. | 일반 토큰으로 관리자 API 호출 |
    | 404 | NOT_FOUND | 알림을 찾을 수 없습니다. | 존재하지 않는 알림 id |
    | 404 | USER_NOT_FOUND | 대상 사용자를 찾을 수 없습니다. | target_user_id 미존재 |
    | 404 | SUBSCRIPTION_NOT_FOUND | 구독 정보를 찾을 수 없습니다. | 등록되지 않은 endpoint |
    | 500 | DB_ERROR | 데이터베이스 조회 중 오류가 발생했습니다. | 서버 내부 DB 오류 |
  type: text/markdown
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
