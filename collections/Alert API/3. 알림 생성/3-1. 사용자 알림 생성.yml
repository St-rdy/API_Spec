info:
  name: 3-1. 사용자 알림 생성
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/api/v1/notifications/user"
  headers:
    - name: Authorization
      value: Bearer {{access_token}}
      description: Access Token
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "target_user_id": 42,
        "type": "chat",
        "title": "새 메시지가 도착했어요",
        "body": "김철수님이 메시지를 보냈습니다.",
        "url": "/chat/room/5"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 201 - 알림 생성 성공
    request:
      url: "{{base_url}}/api/v1/notifications/user"
      method: POST
      headers:
        - name: Authorization
          value: Bearer eyJhbGciOiJIUzI1NiJ9.EXAMPLE
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: '{"target_user_id": 42, "type": "chat", "title": "새 메시지가 도착했어요", "body": "김철수님이 메시지를 보냈습니다.", "url": "/chat/room/5"}'
    response:
      status: 201
      statusText: Created
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "status": 201,
            "code": "SUCCESS",
            "message": "알림이 생성되었습니다.",
            "data": {
              "id": 15,
              "target_user_id": 42,
              "type": "chat",
              "title": "새 메시지가 도착했어요",
              "body": "김철수님이 메시지를 보냈습니다.",
              "is_read": false,
              "url": "/chat/room/5",
              "created_at": "2025-02-25T10:00:00Z"
            }
          }
  - name: 404 - 대상 사용자 없음
    request:
      url: "{{base_url}}/api/v1/notifications/user"
      method: POST
      headers:
        - name: Authorization
          value: Bearer eyJhbGciOiJIUzI1NiJ9.EXAMPLE
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: '{"target_user_id": 9999, "type": "chat", "title": "테스트", "body": "테스트 메시지"}'
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "status": 404,
            "code": "USER_NOT_FOUND",
            "message": "대상 사용자를 찾을 수 없습니다.",
            "data": null
          }
  - name: 400 - 유효하지 않은 타입
    request:
      url: "{{base_url}}/api/v1/notifications/user"
      method: POST
      headers:
        - name: Authorization
          value: Bearer eyJhbGciOiJIUzI1NiJ9.EXAMPLE
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: '{"target_user_id": 42, "type": "unknown", "title": "테스트", "body": "테스트 메시지"}'
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "status": 400,
            "code": "INVALID_TYPE",
            "message": "유효하지 않은 타입입니다.",
            "data": null
          }
  - name: 400 - 필수 필드 누락
    request:
      url: "{{base_url}}/api/v1/notifications/user"
      method: POST
      headers:
        - name: Authorization
          value: Bearer eyJhbGciOiJIUzI1NiJ9.EXAMPLE
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: '{"target_user_id": 42}'
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "status": 400,
            "code": "MISSING_FIELDS",
            "message": "필수 필드가 누락 되었습니다.",
            "data": null
          }
  - name: 401 - 인증 실패
    request:
      url: "{{base_url}}/api/v1/notifications/user"
      method: POST
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "status": 401,
            "code": "UNAUTHORIZED",
            "message": "인증이 필요합니다.",
            "data": null
          }

docs: |-
  ## 3-1. 사용자 알림 생성

  채팅 메시지 수신, 스터디 초대 등 사용자 간 이벤트에서 특정 대상 유저에게 알림을 생성합니다.

  ### 요청 헤더
  | 헤더 | 필수 | 설명 |
  |---|---|---|
  | Authorization | ✅ | `Bearer {accessToken}` |
  | Content-Type | ✅ | `application/json` |

  ### 요청 Body
  | 필드 | 타입 | 필수 | 설명 |
  |---|---|---|---|
  | target_user_id | number | ✅ | 알림을 받을 대상 사용자 ID |
  | type | string | ✅ | 알림 타입 (chat / study / system) |
  | title | string | ✅ | 알림 제목 |
  | body | string | ✅ | 알림 내용 |
  | url | string | ❌ | 알림 클릭 시 이동할 경로 |

  ```json
  {
    "target_user_id": 42,
    "type": "chat",
    "title": "새 메시지가 도착했어요",
    "body": "김철수님이 메시지를 보냈습니다.",
    "url": "/chat/room/5"
  }
  ```

  ### 성공 응답 (201 Created)
  ```json
  {
    "status": 201,
    "code": "SUCCESS",
    "message": "알림이 생성되었습니다.",
    "data": {
      "id": 15,
      "target_user_id": 42,
      "type": "chat",
      "title": "새 메시지가 도착했어요",
      "body": "김철수님이 메시지를 보냈습니다.",
      "is_read": false,
      "url": "/chat/room/5",
      "created_at": "2025-02-25T10:00:00Z"
    }
  }
  ```

  ### 실패 응답
  | Status | code | 메시지 | 발생 원인 |
  |---|---|---|---|
  | 400 | INVALID_TYPE | 유효하지 않은 타입입니다. | 존재하지 않는 type값 사용 |
  | 400 | MISSING_FIELDS | 필수 필드가 누락 되었습니다. | 필수 필드 누락 |
  | 401 | UNAUTHORIZED | 인증이 필요합니다. | 유효하지 않거나 만료된 토큰 |
  | 404 | USER_NOT_FOUND | 대상 사용자를 찾을 수 없습니다. | target_user_id가 존재하지 않음 |
  | 500 | DB_ERROR | 데이터베이스 조회 중 오류가 발생했습니다. | 서버 내부 DB 오류 |
