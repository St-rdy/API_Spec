info:
  name: 3-2. 시스템 알림 생성
  type: http
  seq: 2

http:
  method: POST
  url: "{{base_url}}/api/v1/admin/notifications/system"
  headers:
    - name: Authorization
      value: Bearer {{access_token}}
      description: 관리자 Access Token
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "target": "all",
        "title": "서비스 점검 안내",
        "body": "2월 26일 오전 2시~4시 서버 점검이 예정되어 있습니다.",
        "url": "/notice/123"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 201 - 전체 발송 성공
    request:
      url: "{{base_url}}/api/v1/admin/notifications/system"
      method: POST
      headers:
        - name: Authorization
          value: Bearer eyJhbGciOiJIUzI1NiJ9.ADMIN_EXAMPLE
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: '{"target": "all", "title": "서비스 점검 안내", "body": "2월 26일 오전 2시~4시 서버 점검이 예정되어 있습니다.", "url": "/notice/123"}'
    response:
      status: 201
      statusText: Created
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "status": 201,
            "code": "SUCCESS",
            "message": "시스템 알림이 발송되었습니다.",
            "data": {
              "sent_count": 1024,
              "type": "system",
              "title": "서비스 점검 안내",
              "created_at": "2025-02-25T10:00:00Z"
            }
          }
  - name: 201 - 특정 유저 발송 성공
    request:
      url: "{{base_url}}/api/v1/admin/notifications/system"
      method: POST
      headers:
        - name: Authorization
          value: Bearer eyJhbGciOiJIUzI1NiJ9.ADMIN_EXAMPLE
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: '{"target": "specific", "target_user_ids": [42, 55, 99], "title": "계정 정책 변경 안내", "body": "회원님의 계정에 변경된 정책이 적용되었습니다.", "url": "/policy"}'
    response:
      status: 201
      statusText: Created
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "status": 201,
            "code": "SUCCESS",
            "message": "시스템 알림이 발송되었습니다.",
            "data": {
              "sent_count": 3,
              "type": "system",
              "title": "계정 정책 변경 안내",
              "created_at": "2025-02-25T10:00:00Z"
            }
          }
  - name: 403 - 관리자 권한 없음
    request:
      url: "{{base_url}}/api/v1/admin/notifications/system"
      method: POST
      headers:
        - name: Authorization
          value: Bearer eyJhbGciOiJIUzI1NiJ9.USER_EXAMPLE
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: '{"target": "all", "title": "테스트", "body": "테스트"}'
    response:
      status: 403
      statusText: Forbidden
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "status": 403,
            "code": "FORBIDDEN",
            "message": "관리자 권한이 필요합니다.",
            "data": null
          }
  - name: 400 - 필수 필드 누락
    request:
      url: "{{base_url}}/api/v1/admin/notifications/system"
      method: POST
      headers:
        - name: Authorization
          value: Bearer eyJhbGciOiJIUzI1NiJ9.ADMIN_EXAMPLE
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: '{"target": "all"}'
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "status": 400,
            "code": "MISSING_FIELDS",
            "message": "필수 필드가 누락 되었습니다.",
            "data": null
          }
  - name: 401 - 인증 실패
    request:
      url: "{{base_url}}/api/v1/admin/notifications/system"
      method: POST
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "status": 401,
            "code": "UNAUTHORIZED",
            "message": "인증이 필요합니다.",
            "data": null
          }

docs: |-
  ## 3-2. 시스템 알림 생성

  운영팀이 전체 유저 또는 특정 유저에게 공지, 안내, 점검 내용 등의 시스템 알림을 발송합니다.

  ### ⚠️ 관리자 전용 API
  일반 사용자 토큰으로 호출 시 403 FORBIDDEN 응답을 반환합니다.

  ### 요청 헤더
  | 헤더 | 필수 | 설명 |
  |---|---|---|
  | Authorization | ✅ | `Bearer {adminAccessToken}` |
  | Content-Type | ✅ | `application/json` |

  ### 요청 Body - 전체 발송
  | 필드 | 타입 | 필수 | 설명 |
  |---|---|---|---|
  | target | string | ✅ | `"all"` (전체 유저) |
  | title | string | ✅ | 알림 제목 |
  | body | string | ✅ | 알림 내용 |
  | url | string | ❌ | 알림 클릭 시 이동할 경로 |

  ```json
  {
    "target": "all",
    "title": "서비스 점검 안내",
    "body": "2월 26일 오전 2시~4시 서버 점검이 예정되어 있습니다.",
    "url": "/notice/123"
  }
  ```

  ### 요청 Body - 특정 유저 발송
  | 필드 | 타입 | 필수 | 설명 |
  |---|---|---|---|
  | target | string | ✅ | `"specific"` (특정 유저) |
  | target_user_ids | number[] | ✅ | 발송 대상 사용자 ID 목록 |
  | title | string | ✅ | 알림 제목 |
  | body | string | ✅ | 알림 내용 |
  | url | string | ❌ | 알림 클릭 시 이동할 경로 |

  ```json
  {
    "target": "specific",
    "target_user_ids": [42, 55, 99],
    "title": "계정 정책 변경 안내",
    "body": "회원님의 계정에 변경된 정책이 적용되었습니다.",
    "url": "/policy"
  }
  ```

  ### 성공 응답 (201 Created)
  ```json
  {
    "status": 201,
    "code": "SUCCESS",
    "message": "시스템 알림이 발송되었습니다.",
    "data": {
      "sent_count": 1024,
      "type": "system",
      "title": "서비스 점검 안내",
      "created_at": "2025-02-25T10:00:00Z"
    }
  }
  ```

  ### 실패 응답
  | Status | code | 메시지 | 발생 원인 |
  |---|---|---|---|
  | 400 | INVALID_TYPE | 유효하지 않은 타입입니다. | 존재하지 않는 type값 사용 |
  | 400 | MISSING_FIELDS | 필수 필드가 누락 되었습니다. | 필수 필드 누락 |
  | 401 | UNAUTHORIZED | 인증이 필요합니다. | 유효하지 않거나 만료된 토큰 |
  | 403 | FORBIDDEN | 관리자 권한이 필요합니다. | 일반 토큰으로 호출 |
  | 404 | USER_NOT_FOUND | 대상 사용자를 찾을 수 없습니다. | target_user_ids 중 존재하지 않는 ID |
  | 500 | DB_ERROR | 데이터베이스 조회 중 오류가 발생했습니다. | 서버 내부 DB 오류 |
