docs: |-
  ## 4-1. VAPID 공개키 조회

  Web Push 구독 시 필요한 VAPID 공개키를 조회합니다.
  브라우저의 `PushManager.subscribe()` 호출 시 `applicationServerKey`로 사용합니다.

  ### 인증 필요 여부
  ❌ 인증 불필요 (공개 엔드포인트)

  ### Web Push 구독 흐름
  1. 이 API로 VAPID 공개키 조회
  2. 브라우저 `PushManager.subscribe({ userVisibleOnly: true, applicationServerKey: public_key })` 호출
  3. 구독 결과(endpoint, keys)를 `POST /push/subscribe` 로 서버에 등록

  ### 성공 응답 (200 OK)
  ```json
  {
    "status": 200,
    "code": "SUCCESS",
    "message": "VAPID 공개키를 가져왔습니다.",
    "data": {
      "public_key": "BEl62iUYgUivxIkv69yViEuiBIa..."
    }
  }
  ```
