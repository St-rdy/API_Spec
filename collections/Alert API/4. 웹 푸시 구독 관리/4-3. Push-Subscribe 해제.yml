info:
  name: 4-3. Push-Subscribe 해제
  type: http
  seq: 3

http:
  method: DELETE
  url: "{{base_url}}/api/v1/notifications/push/unsubscribe"
  headers:
    - name: Authorization
      value: Bearer {{access_token}}
      description: Access Token
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "endpoint": "https://fcm.googleapis.com/fcm/send/xxx"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 - 구독 해제 성공
    request:
      url: "{{base_url}}/api/v1/notifications/push/unsubscribe"
      method: DELETE
      headers:
        - name: Authorization
          value: Bearer eyJhbGciOiJIUzI1NiJ9.EXAMPLE
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: '{"endpoint": "https://fcm.googleapis.com/fcm/send/xxx"}'
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "status": 200,
            "code": "SUCCESS",
            "message": "푸시 구독이 해제되었습니다.",
            "data": null
          }
  - name: 404 - 구독 정보 없음
    request:
      url: "{{base_url}}/api/v1/notifications/push/unsubscribe"
      method: DELETE
      headers:
        - name: Authorization
          value: Bearer eyJhbGciOiJIUzI1NiJ9.EXAMPLE
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: '{"endpoint": "https://fcm.googleapis.com/fcm/send/not-registered"}'
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "status": 404,
            "code": "SUBSCRIPTION_NOT_FOUND",
            "message": "구독 정보를 찾을 수 없습니다.",
            "data": null
          }
  - name: 401 - 인증 실패
    request:
      url: "{{base_url}}/api/v1/notifications/push/unsubscribe"
      method: DELETE
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "status": 401,
            "code": "UNAUTHORIZED",
            "message": "인증이 필요합니다.",
            "data": null
          }

docs: |-
  ## 4-3. Push-Subscribe 해제

  등록된 Web Push 구독을 해제합니다. 브라우저의 Push 구독 endpoint를 전달하면 서버에서 해당 구독 정보를 삭제합니다.

  ### 요청 헤더
  | 헤더 | 필수 | 설명 |
  |---|---|---|
  | Authorization | ✅ | `Bearer {accessToken}` |
  | Content-Type | ✅ | `application/json` |

  ### 요청 Body
  | 필드 | 타입 | 필수 | 설명 |
  |---|---|---|---|
  | endpoint | string | ✅ | 해제할 Push 구독 URL (등록 시 사용한 endpoint와 동일) |

  ```json
  {
    "endpoint": "https://fcm.googleapis.com/fcm/send/xxx"
  }
  ```

  ### 성공 응답 (200 OK)
  ```json
  {
    "status": 200,
    "code": "SUCCESS",
    "message": "푸시 구독이 해제되었습니다.",
    "data": null
  }
  ```

  ### 실패 응답
  | Status | code | 메시지 | 발생 원인 |
  |---|---|---|---|
  | 401 | UNAUTHORIZED | 인증이 필요합니다. | 유효하지 않거나 만료된 토큰 |
  | 404 | SUBSCRIPTION_NOT_FOUND | 구독 정보를 찾을 수 없습니다. | 등록되지 않은 endpoint |
  | 500 | DB_ERROR | 데이터베이스 조회 중 오류가 발생했습니다. | 서버 내부 DB 오류 |
