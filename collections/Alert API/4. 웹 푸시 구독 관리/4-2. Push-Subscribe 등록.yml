info:
  name: 4-2. Push-Subscribe 등록
  type: http
  seq: 2

http:
  method: POST
  url: "{{base_url}}/api/v1/notifications/push/subscribe"
  headers:
    - name: Authorization
      value: Bearer {{access_token}}
      description: Access Token
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "endpoint": "https://fcm.googleapis.com/fcm/send/xxx",
        "keys": {
          "p256dh": "BNcRdreALRFXTkOATbGE...",
          "auth": "tBHItJI5svbpez7KI4CCXg"
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 201 - 구독 등록 성공
    request:
      url: "{{base_url}}/api/v1/notifications/push/subscribe"
      method: POST
      headers:
        - name: Authorization
          value: Bearer eyJhbGciOiJIUzI1NiJ9.EXAMPLE
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: '{"endpoint": "https://fcm.googleapis.com/fcm/send/xxx", "keys": {"p256dh": "BNcRdreALRFXTkOATbGE...", "auth": "tBHItJI5svbpez7KI4CCXg"}}'
    response:
      status: 201
      statusText: Created
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "status": 201,
            "code": "SUCCESS",
            "message": "푸시 구독이 등록되었습니다.",
            "data": null
          }
  - name: 400 - 필수 필드 누락
    request:
      url: "{{base_url}}/api/v1/notifications/push/subscribe"
      method: POST
      headers:
        - name: Authorization
          value: Bearer eyJhbGciOiJIUzI1NiJ9.EXAMPLE
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: '{"endpoint": "https://fcm.googleapis.com/fcm/send/xxx"}'
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "status": 400,
            "code": "MISSING_FIELDS",
            "message": "필수 필드가 누락 되었습니다.",
            "data": null
          }
  - name: 401 - 인증 실패
    request:
      url: "{{base_url}}/api/v1/notifications/push/subscribe"
      method: POST
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "status": 401,
            "code": "UNAUTHORIZED",
            "message": "인증이 필요합니다.",
            "data": null
          }

docs: |-
  ## 4-2. Push-Subscribe 등록

  브라우저에서 생성된 Web Push 구독 정보를 서버에 등록합니다.
  등록 후 서버는 Web-Push 라이브러리를 통해 해당 구독으로 알림을 발송합니다.

  ### 요청 헤더
  | 헤더 | 필수 | 설명 |
  |---|---|---|
  | Authorization | ✅ | `Bearer {accessToken}` |
  | Content-Type | ✅ | `application/json` |

  ### 요청 Body
  | 필드 | 타입 | 필수 | 설명 |
  |---|---|---|---|
  | endpoint | string | ✅ | 브라우저가 제공하는 Push 수신 URL |
  | keys.p256dh | string | ✅ | 암호화 공개키 |
  | keys.auth | string | ✅ | 인증 시크릿 |

  ```json
  {
    "endpoint": "https://fcm.googleapis.com/fcm/send/xxx",
    "keys": {
      "p256dh": "BNcRdreALRFXTkOATbGE...",
      "auth": "tBHItJI5svbpez7KI4CCXg"
    }
  }
  ```

  ### 성공 응답 (201 Created)
  ```json
  {
    "status": 201,
    "code": "SUCCESS",
    "message": "푸시 구독이 등록되었습니다.",
    "data": null
  }
  ```

  ### 실패 응답
  | Status | code | 메시지 | 발생 원인 |
  |---|---|---|---|
  | 400 | MISSING_FIELDS | 필수 필드가 누락 되었습니다. | endpoint 또는 keys 누락 |
  | 401 | UNAUTHORIZED | 인증이 필요합니다. | 유효하지 않거나 만료된 토큰 |
  | 500 | DB_ERROR | 데이터베이스 조회 중 오류가 발생했습니다. | 서버 내부 DB 오류 |
