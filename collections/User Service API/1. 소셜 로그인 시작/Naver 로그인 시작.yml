info:
  name: Naver 로그인 시작
  type: http
  seq: 3

http:
  method: GET
  url: "{{base_url}}/api/v1/oauth2/authorization/naver"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 302 - Naver 로그인 페이지로 Redirect
    request:
      url: "{{base_url}}/api/v1/oauth2/authorization/naver"
      method: GET
    response:
      status: 302
      statusText: Found
      headers:
        - name: Location
          value: https://nid.naver.com/oauth2.0/authorize?client_id=...&redirect_uri=...&response_type=code
      body:
        type: text
        data: ""

docs: |-
  ## Naver 소셜 로그인 시작

  ### ⚠️ 중요 — 반드시 페이지 이동으로 호출해야 합니다

  ### 올바른 호출 방법
  ```javascript
  window.location.href = '{{base_url}}/api/v1/oauth2/authorization/naver';
  ```

  ### 처리 흐름
  1. 프론트 → 이 URL로 페이지 이동
  2. Spring Security가 요청을 가로채서 Naver 로그인 페이지로 **302 redirect**
  3. 사용자가 Naver 로그인 완료
  4. 백엔드 콜백 처리 (자동)
  5. 프론트 콜백 페이지로 redirect: `https://www.example.com/oauth2/callback?code={임시코드}`

  ### 응답
  | 상황 | 결과 |
  |---|---|
  | 정상 | Naver 로그인 페이지로 302 redirect |
  | 로그인 실패 | 프론트 `/login?error=OAUTH2_FAILED`로 redirect |
