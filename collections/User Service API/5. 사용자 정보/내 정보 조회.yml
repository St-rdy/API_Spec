info:
  name: 내 정보 조회
  type: http
  seq: 1

http:
  method: GET
  url: "{{base_url}}/api/v1/users/me"
  headers:
    - name: Authorization
      value: Bearer {{access_token}}
      description: Access Token
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 - 조회 성공
    request:
      url: "{{base_url}}/api/v1/users/me"
      method: GET
      headers:
        - name: Authorization
          value: Bearer eyJhbGciOiJIUzI1NiJ9.EXAMPLE
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": 1,
            "email": "user@gmail.com",
            "name": "홍길동",
            "nickname": "길동이",
            "profileImageUrl": "https://cdn.example.com/profiles/1.png",
            "status": "ACTIVE",
            "lastLoginAt": "2026-03-01T12:00:00",
            "providers": [
              "google"
            ],
            "roles": [
              "USER"
            ],
            "domainId": 1,
            "subjectIds": [
              1,
              3
            ],
            "regionIds": [
              10,
              11
            ]
          }
  - name: 401 - AT 만료
    request:
      url: "{{base_url}}/api/v1/users/me"
      method: GET
      headers:
        - name: Authorization
          value: Bearer eyJhbGciOiJIUzI1NiJ9.EXAMPLE
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": "TOKEN_EXPIRED",
            "message": "Access Token이 만료되었습니다.",
            "timestamp": "2026-03-01T12:00:00"
          }

docs: |-
  ## 내 정보 조회

  현재 로그인한 사용자의 전체 정보를 조회합니다.

  ### 데이터 출처
  | 필드 | 출처 |
  |---|---|
  | id, email, name, nickname, profileImageUrl, status, lastLoginAt, providers, roles | User Service DB |
  | domainId, subjectIds, regionIds | gRPC → 게시판 서비스 |

  ### 성공 응답 (200 OK)
  ```json
  {
    "id": 1,
    "email": "user@gmail.com",
    "name": "홍길동",
    "nickname": "길동이",
    "profileImageUrl": "https://cdn.example.com/profiles/1.png",
    "status": "ACTIVE",
    "lastLoginAt": "2026-03-01T12:00:00",
    "providers": ["google"],
    "roles": ["USER"],
    "domainId": 1,
    "subjectIds": [1, 3],
    "regionIds": [10, 11]
  }
  ```

  ### 실패 응답
  | Status | error | 상황 | 프론트 처리 |
  |---|---|---|---|
  | 401 | TOKEN_EXPIRED | AT 만료 | refresh 후 재시도 |
  | 401 | UNAUTHORIZED | AT 없음 | 로그인 페이지 이동 |
