docs:
  content: |-
    # User Service API 명세서

    ## 개요

    소셜 로그인(Google / Kakao / Naver) 기반의 인증 및 사용자 관리 API입니다.  
    Spring Security OAuth2 + JWT(AT/RT) + RTR 방식을 사용합니다.

    ---

    ## 아키텍처

    - **인증**: Spring Security OAuth2 Client + JWT
        
    - **MSA**: User Service ↔ 게시판 Service (gRPC 통신)
        
    - **도메인 정보**: 게시판 Service DB에서 관리, User Service가 gRPC로 조회/수정 요청
        

    ---

    ## 기술 스택

    | 항목 | 내용 |
    | --- | --- |
    | 인증 방식 | OAuth2 Authorization Code Flow (Pattern B) |
    | Security | Spring Security OAuth2 Client |
    | Token 구조 | Access Token(AT) + Refresh Token(RT), RTR 방식 |
    | AT 저장 | 프론트엔드 메모리 상태 관리 (Zustand 등) |
    | RT 저장 | HttpOnly Cookie + Server-side Redis |
    | 서비스 통신 | gRPC (User ↔ 게시판) |

    ---

    ## 전체 플로우 요약

    **① 로그인 시작**  
    사용자가 소셜 로그인 버튼 클릭 → `window.location.href`로 URL 이동 (Axios 호출 아님!)

    **② 리다이렉션**  
    Spring Security가 가로채서 소셜 제공자 로그인 페이지로 자동 redirect

    **③ 콜백**  
    소셜 로그인 완료 → 백엔드가 AT/RT 생성, 임시코드 발급 → 프론트 콜백 페이지로 redirect  
    `https://www.example.com/oauth2/callback?code={임시코드}`

    **④ 토큰 교환**  
    프론트 콜백 페이지에서 code 파싱 → `GET /api/v1/auth/token?code={임시코드}` 호출  
    → AT 응답(Body) + RT 응답(HttpOnly Cookie)

    **⑤ 이후 API 호출**  
    모든 요청 헤더에 `Authorization: Bearer {AT}` 포함

    **⑥ AT 만료 시**  
    `POST /api/v1/auth/token/refresh` 호출 → 새 AT + 새 RT 발급 (RTR)

    ---

    ## 전체 API 목록

    ### 인증

    | 메서드 | URL | 설명 |
    | --- | --- | --- |
    | GET | /api/v1/oauth2/authorization/{provider} | 소셜 로그인 시작 |
    | X | /oauth2/callback | 라우팅 용도 (UUID 콜백 용) |
    | GET | /api/v1/auth/token | 임시코드 → AT 교환 |
    | POST | /api/v1/auth/token/refresh | AT 재발급 (RTR) |
    | POST | /api/v1/auth/logout | 로그아웃 |

    ### 내 정보

    | 메서드 | URL | 설명 |
    | --- | --- | --- |
    | GET | /api/v1/users/me | 내 정보 조회 (도메인 정보 포함) |
    | PATCH | /api/v1/users/me | 내 정보 수정 (닉네임/이미지/도메인 정보) |
    | DELETE | /api/v1/users/me | 회원 탈퇴 (status → INACTIVE) |

    ### 프로필

    | 메서드 | URL | 설명 |
    | --- | --- | --- |
    | GET | /api/v1/users/profile-images | 선택 가능한 이미지 목록 |
    | GET | /api/v1/users/nickname/check | 닉네임 중복 체크 |

    ### 다른 유저

    | 메서드 | URL | 설명 |
    | --- | --- | --- |
    | GET | /api/v1/users/{userId} | 다른 유저 프로필 조회 |

    ### 소셜 연동

    | 메서드 | URL | 설명 |
    | --- | --- | --- |
    | GET | /api/v1/users/me/providers | 연결된 소셜 목록 조회 |
    | DELETE | /api/v1/users/me/providers/{provider} | 소셜 연동 해제 |

    ---

    ## 공통 규칙

    ### 인증 헤더

    인증이 필요한 모든 API에 아래 헤더를 포함해야 합니다.

    ```
    Authorization: Bearer {accessToken}

     ```

    ### withCredentials 설정

    Cookie를 주고받는 모든 요청에 반드시 `withCredentials: true` 설정이 필요합니다.

    - `GET /api/v1/auth/token`
        
    - `POST /api/v1/auth/token/refresh`
        
    - `POST /api/v1/auth/logout`
        

    ### AT 저장 규칙

    |  | 허용 여부 |
    | --- | --- |
    | Zustand (메모리) | ✅ 권장 |
    | localStorage | ❌ 금지 (XSS 취약) |
    | sessionStorage | ❌ 금지 (XSS 취약) |
    | Cookie | ❌ 금지 (RT와 혼용 금지) |

    ### 공통 에러 응답 포맷

    ``` json
    {
      "error": "에러코드",
      "message": "사용자에게 보여줄 메시지",
      "timestamp": "2026-03-01T12:00:00"
    }

     ```

    ---

    ## 에러 코드 전체 목록

    | HTTP | error | 발생 시점 | 프론트 처리 |
    | --- | --- | --- | --- |
    | 400 | INVALID_TEMP_CODE | 임시코드 만료 또는 재사용 시도 | 재로그인 유도 |
    | 400 | MISSING_PARAMETER | 필수 파라미터 누락 | 에러 메시지 표시 |
    | 400 | INVALID_PROVIDER | 지원하지 않는 provider | 에러 메시지 표시 |
    | 400 | DUPLICATED_PROVIDER | 이미 연결된 소셜 계정 | 에러 메시지 표시 |
    | 400 | INVALID_NICKNAME | 닉네임 형식 오류 | 에러 메시지 표시 |
    | 400 | INVALID_PROFILE_IMAGE | 허용되지 않은 이미지 URL | 에러 메시지 표시 |
    | 400 | LAST_PROVIDER | 마지막 소셜 연동 해제 시도 | 최소 1개 소셜 연동 필요 안내 |
    | 400 | INVALID_DOMAIN | 유효하지 않은 도메인으로 변경 시도 | 에러 메시지 표시 |
    | 401 | UNAUTHORIZED | AT 없음 또는 형식 오류 | 로그인 페이지 이동 |
    | 401 | TOKEN_EXPIRED | AT 만료 | refresh 후 재시도 |
    | 401 | REFRESH_TOKEN_NOT_FOUND | RT Cookie 없음 | 로그인 페이지 이동 |
    | 401 | REFRESH_TOKEN_EXPIRED | RT 만료 | 로그인 페이지 이동 |
    | 401 | INVALID_TOKEN | 토큰 변조 또는 불일치 (탈취 의심) | 강제 로그아웃 후 로그인 이동 |
    | 404 | USER_NOT_FOUND | 존재하지 않거나 탈퇴한 유저 | 에러 메시지 표시 |
    | 404 | PROVIDER_NOT_FOUND | 연결되지 않은 소셜 계정 | 에러 메시지 표시 |
    | 500 | OAUTH2_AUTH_FAILED | 소셜 제공자 인증 실패 | 재시도 안내 |
    | 500 | SERVER_ERROR | 서버 내부 오류 | 재시도 안내 |
  type: text/markdown
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
