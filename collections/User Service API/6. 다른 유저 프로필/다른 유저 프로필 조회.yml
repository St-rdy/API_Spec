info:
  name: 다른 유저 프로필 조회
  type: http
  seq: 1

http:
  method: GET
  url: "{{base_url}}/api/v1/users/:userId"
  headers:
    - name: Authorization
      value: Bearer {{access_token}}
      description: Access Token
  params:
    - name: userId
      value: "2"
      type: path
      description: 조회할 유저 ID
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 - 조회 성공
    request:
      url: "{{base_url}}/api/v1/users/2"
      method: GET
      headers:
        - name: Authorization
          value: Bearer eyJhbGciOiJIUzI1NiJ9.EXAMPLE
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": 2,
            "nickname": "스터디왕",
            "profileImageUrl": "https://cdn.example.com/profiles/2.png",
            "lastLoginAt": "2026-03-01T12:00:00"
          }
  - name: 404 - 존재하지 않거나 탈퇴한 유저
    request:
      url: "{{base_url}}/api/v1/users/999"
      method: GET
      headers:
        - name: Authorization
          value: Bearer eyJhbGciOiJIUzI1NiJ9.EXAMPLE
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": "USER_NOT_FOUND",
            "message": "존재하지 않는 유저입니다.",
            "timestamp": "2026-03-01T12:00:00"
          }
  - name: 401 - AT 만료
    request:
      url: "{{base_url}}/api/v1/users/2"
      method: GET
      headers:
        - name: Authorization
          value: Bearer eyJhbGciOiJIUzI1NiJ9.EXAMPLE
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": "TOKEN_EXPIRED",
            "message": "Access Token이 만료되었습니다.",
            "timestamp": "2026-03-01T12:00:00"
          }

docs: |-
  ## 다른 유저 프로필 조회

  ### 실패 응답
  | Status | error | 상황 | 프론트 처리 |
  |---|---|---|---|
  | 404 | USER_NOT_FOUND | 존재하지 않거나 탈퇴한 유저 | 에러 메시지 표시 |
  | 401 | TOKEN_EXPIRED | AT 만료 | refresh 후 재시도 |
  | 401 | UNAUTHORIZED | AT 없음 | 로그인 페이지 이동 |
