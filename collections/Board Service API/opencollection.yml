docs:
  content: |-
    # Board Service API 명세서

    ## 개요

    게시글, 댓글, 이미지 관리를 위한 API입니다.  
    JWT 기반의 인증을 사용하며, 모든 요청은 `ApiResponse` 공통 포맷으로 응답합니다.

    ---

    ## 기술 스택

    | 항목 | 내용 |
    | --- | --- |
    | Language | Java 21 |
    | Framework | Spring Boot 3.4.13 |
    | Database | PostgreSQL |
    | Security | Spring Security, JJWT |

    ---

    ## 전체 API 목록

    ### 게시글 (Post)

    | 메서드 | URL | 설명 |
    | --- | --- | --- |
    | GET | /api/v1/post/{postId} | 게시글 상세 조회 |
    | GET | /api/v1/post | 게시글 목록 조회 |
    | POST | /api/v1/post | 게시글 생성 |
    | PATCH | /api/v1/post/{postId} | 게시글 수정 |
    | POST | /api/v1/post/{postId}/like | 게시글 좋아요 토글 |
    | POST | /api/v1/post/{postId}/scrap | 게시글 스크랩 토글 |

    ### 댓글 (Comment)

    | 메서드 | URL | 설명 |
    | --- | --- | --- |
    | GET | /api/v1/post/{postId}/comments | 댓글 목록 조회 |
    | POST | /api/v1/post/{postId}/comment | 댓글 작성 |
    | PATCH | /api/v1/comment/{commentId} | 댓글 수정 |
    | DELETE | /api/v1/comment/{commentId} | 댓글 삭제 |

    ### 이미지 (Image)

    | 메서드 | URL | 설명 |
    | --- | --- | --- |
    | POST | /api/v1/image | 이미지 업로드 |

    ---

    ## 공통 규칙

    ### 인증 헤더

    인증이 필요한 모든 API에 아래 헤더를 포함해야 합니다.

    ```
    Authorization: Bearer {accessToken}
    ```

    ### 공통 응답 포맷

    ```json
    {
      "code": 200,
      "status": "SUCCESS",
      "message": "성공 메시지",
      "data": { ... }
    }
    ```

    ### 공통 에러 응답 포맷

    ```json
    {
      "code": 401,
      "status": "UNAUTHORIZED",
      "message": "인증이 필요합니다.",
      "data": null
    }
    ```

    ---

    ## 에러 코드 전체 목록

    | code | status | 메시지 | 발생 시점 |
    | --- | --- | --- | --- |
    | 400 | MISSING_FIELDS | 필수 필드 누락 | 필수 필드 누락 |
    | 400 | INVALID_FIELD | 유효하지 않은 필드값 | 유효하지 않은 필드값 |
    | 400 | TITLE_REQUIRED | 제목을 입력해주세요. | 제목 미입력 |
    | 400 | CONTENT_REQUIRED | 내용을 입력해주세요. | 내용 미입력 |
    | 400 | INVALID_CATEGORY | 유효하지 않은 카테고리입니다. | 유효하지 않은 카테고리 |
    | 400 | INVALID_PARENT | 대댓글에는 답글을 달 수 없습니다. | 대댓글에 답글 달기 시도 |
    | 400 | EMPTY_FILE | 첨부된 파일이 없습니다. | 첨부 파일 없음 |
    | 400 | INVALID_FILE_EXTENSION | 지원하지 않는 이미지 형식입니다. | 지원하지 않는 이미지 형식 |
    | 400 | IMAGE_LIMIT_EXCEEDED | 게시글 1개당 최대 10개의 이미지만 등록할 수 있습니다. | 이미지 개수 초과 |
    | 400 | ALREADY_MAPPED_IMAGE | 이미 다른 게시글에 등록된 이미지입니다. | 이미 등록된 이미지 |
    | 401 | UNAUTHORIZED | 인증이 필요합니다. | 인증 필요 |
    | 401 | INVALID_TOKEN | 유효하지 않거나 만료된 토큰입니다. | 유효하지 않은 토큰 |
    | 403 | FORBIDDEN | 권한이 없습니다. | 권한 없음 |
    | 403 | IMAGE_ACCESS_DENIED | 본인이 업로드한 이미지만 사용할 수 있습니다. | 본인 업로드 이미지가 아님 |
    | 404 | NOT_FOUND | 게시글을 찾을 수 없습니다. | 게시글 찾을 수 없음 |
    | 404 | PARENT_NOT_FOUND | 상위 댓글을 찾을 수 없습니다. | 상위 댓글 찾을 수 없음 |
    | 500 | DB_ERROR | 데이터베이스 조회 중 오류가 발생했습니다. | 서버 내부 오류 |
  type: text/markdown
