info:
  name: 댓글 수정
  type: http
  seq: 3

http:
  method: PATCH
  url: "{{base_url}}/api/v1/comment/:commentId"
  headers:
    - name: Authorization
      value: "Bearer {{access_token}}"
    - name: Content-Type
      value: application/json
  params:
    - name: commentId
      value: "1"
      type: path
  body:
    type: json
    data: |-
      {
        "content": "수정된 댓글 내용"
      }
  auth: inherit

examples:
  - name: 200 - 수정 성공
    request:
      url: "{{base_url}}/api/v1/comment/1"
      method: PATCH
      headers:
        - name: Authorization
          value: Bearer eyJhbGciOiJIUzI1NiJ9.EXAMPLE
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: '{"content": "수정된 댓글 내용"}'
    response:
      status: 200
      statusText: OK
      body:
        type: json
        data: |-
          {
            "code": 200,
            "status": "SUCCESS",
            "message": "댓글 수정 성공",
            "data": {
              "id": 1,
              "userId": 42,
              "nickname": "사용자명",
              "profileUrl": "https://s3.amazonaws.com/stardy/profile.jpg",
              "content": "수정된 댓글 내용",
              "status": "ACTIVE",
              "createdAt": "2026-05-07T12:00:00",
              "replies": []
            }
          }

docs: |-
  ## 댓글 수정

  본인이 작성한 댓글을 수정합니다.

  ### 요청 바디
  | 필드 | 타입 | 필수 | 설명 |
  |---|---|---|---|
  | content | string | ✅ | 수정할 댓글 내용 |

  ### 성공 응답 (200 OK)

  수정된 댓글의 전체 정보를 반환합니다. 응답 필드는 댓글 작성과 동일합니다.
