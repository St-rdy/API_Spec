docs:
  content: |-
    ## 이미지 관련 API

    이미지 업로드 및 관리 기능을 제공합니다.

    ### 선 업로드 방식 (Pre-upload)

    본 서비스는 **선 업로드 방식**을 채택합니다.
    게시글 작성 완료 시점에 이미지를 업로드하는 것이 아니라, **이미지 추가와 동시에 즉시 업로드**합니다.

    **흐름 요약**
    1. 사용자가 게시글 작성 중 이미지를 첨부
    2. 첨부 즉시 `POST /api/v1/image` 호출
    3. 업로드 성공 시 이미지 `id` 반환
    4. 게시글 최종 제출 시 반환받은 `id` 목록을 `imageIds` 필드에 포함하여 `POST /api/v1/post` 호출

    > 이미지 업로드에 실패한 경우 해당 이미지의 id는 포함하지 않습니다.

    ### 인증 필요 여부
    - **업로드 API**: ✅ 인증 필수
