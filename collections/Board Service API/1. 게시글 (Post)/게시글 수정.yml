info:
  name: 게시글 수정
  type: http
  seq: 4

http:
  method: PATCH
  url: "{{base_url}}/api/v1/post/:postId"
  headers:
    - name: Authorization
      value: "Bearer {{access_token}}"
    - name: Content-Type
      value: application/json
  params:
    - name: postId
      value: "1"
      type: path
  body:
    type: json
    data: |-
      {
        "category": {
          "regions": [{ "value": "Seoul", "label": "서울" }],
          "subjects": [{ "value": "Mathematics", "label": "수학" }]
        },
        "title": "수정된 제목",
        "content": "수정된 내용",
        "imageIds": []
      }
  auth: inherit

