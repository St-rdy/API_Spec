docs: |-
  ## 게시글 수정

  작성한 게시글을 수정합니다. 본인만 수정 가능합니다.

  ### 요청 바디
  | 필드 | 타입 | 필수 | 설명 |
  |---|---|---|---|
  | category | object | ✅ | 카테고리 정보 (게시글 생성과 동일 구조) |
  | category.regions | array | ✅ | 지역 목록 (`value` / `label`) |
  | category.subjects | array | ✅ | 과목 목록 (`value` / `label`) |
  | title | string | ✅ | 게시글 제목 |
  | content | string | ✅ | 게시글 내용 |
  | imageIds | number[] | ✅ | 이미지 ID 목록 (없으면 빈 배열) |

  ### 성공 응답 (200 OK)

  수정된 게시글의 전체 정보를 반환합니다. 응답 필드는 게시글 생성과 동일합니다.
