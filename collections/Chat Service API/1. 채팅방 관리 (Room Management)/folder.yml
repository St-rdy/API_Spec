    ## 채팅방 관리 API

    채팅방의 생성, 목록 조회, 상세 조회, 설정 수정 기능을 제공합니다.
    채팅방은 스터디 그룹과 연동되며, 방장이 '이전 대화 공개 여부(historyVisible)'를 제어합니다.

