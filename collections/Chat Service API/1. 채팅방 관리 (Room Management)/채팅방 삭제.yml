info:
  name: 채팅방 삭제
  type: http
  seq: 5

http:
  method: DELETE
  url: "{{base_url}}/api/v1/chat/rooms/:roomId"
  headers:
    - name: Authorization
      value: "Bearer {{access_token}}"
  params:
    - name: roomId
      value: "1"
      type: path
      description: 삭제할 채팅방 ID
  auth: inherit

examples:
  - name: 200 - 삭제 성공
    request:
      url: "{{base_url}}/api/v1/chat/rooms/1"
      method: DELETE
      headers:
        - name: Authorization
          value: Bearer eyJhbGciOiJIUzI1NiJ9.EXAMPLE
    response:
      status: 200
      statusText: OK
      body:
        type: json
        data: |-
          {
            "code": 200,
            "status": "SUCCESS",
            "message": "채팅방이 삭제되었습니다.",
            "data": null
          }
  - name: 403 - 방장 아님
    request:
      url: "{{base_url}}/api/v1/chat/rooms/1"
      method: DELETE
      headers:
        - name: Authorization
          value: Bearer eyJhbGciOiJIUzI1NiJ9.EXAMPLE
    response:
      status: 403
      statusText: Forbidden
      body:
        type: json
        data: |-
          {
            "code": 403,
            "status": "NOT_ROOM_OWNER",
            "message": "채팅방 방장만 수정할 수 있습니다.",
            "data": null
          }
  - name: 404 - 채팅방 없음
    request:
      url: "{{base_url}}/api/v1/chat/rooms/999"
      method: DELETE
      headers:
        - name: Authorization
          value: Bearer eyJhbGciOiJIUzI1NiJ9.EXAMPLE
    response:
      status: 404
      statusText: Not Found
      body:
        type: json
        data: |-
          {
            "code": 404,
            "status": "ROOM_NOT_FOUND",
            "message": "채팅방을 찾을 수 없습니다.",
            "data": null
          }

docs: |-
  ## 채팅방 삭제

  채팅방을 삭제합니다. 방장(OWNER)만 삭제할 수 있습니다.

  > **Board Service 연동**: 스터디 그룹이 삭제될 때 Board Service가 자동으로 이 API를 호출합니다.
  > 이 경우 그룹 방장(OWNER)의 인증 토큰으로 호출됩니다.

  삭제 시 아래 데이터가 모두 함께 제거됩니다.
  - `chat_participants` — 채팅방 멤버 전체
  - `chat_messages` — 모든 메시지 (Soft Delete 포함)
  - `chat_files` — 업로드된 파일 레코드 및 스토리지 파일

  ### 요청 헤더
  | 헤더 | 필수 | 설명 |
  |---|---|---|
  | Authorization | ✅ | `Bearer {accessToken}` (방장만 허용) |

  ### Path Parameters
  | 파라미터 | 타입 | 필수 | 설명 |
  |---|---|---|---|
  | roomId | number | ✅ | 삭제할 채팅방 ID |

  ### 성공 응답 (200 OK)
  ```json
  {
    "code": 200,
    "status": "SUCCESS",
    "message": "채팅방이 삭제되었습니다.",
    "data": null
  }
  ```

  ### 실패 응답
  | Status | code | 메시지 | 발생 원인 |
  |---|---|---|---|
  | 401 | UNAUTHORIZED | 인증이 필요합니다. | 토큰 없음 |
  | 403 | NOT_ROOM_OWNER | 채팅방 방장만 수정할 수 있습니다. | 방장이 아닌 사용자의 삭제 시도 |
  | 404 | ROOM_NOT_FOUND | 채팅방을 찾을 수 없습니다. | 존재하지 않는 roomId |
