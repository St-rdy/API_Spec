info:
  name: 채팅방 목록 조회
  type: http
  seq: 2

http:
  method: GET
  url: "{{base_url}}/api/v1/chat/rooms"
  headers:
    - name: Authorization
      value: "Bearer {{access_token}}"
  auth: inherit

examples:
  - name: 200 - 조회 성공
    request:
      url: "{{base_url}}/api/v1/chat/rooms"
      method: GET
      headers:
        - name: Authorization
          value: Bearer eyJhbGciOiJIUzI1NiJ9.EXAMPLE
    response:
      status: 200
      statusText: OK
      body:
        type: json
        data: |-
          {
            "code": 200,
            "status": "SUCCESS",
            "message": "채팅방 목록 조회 성공",
            "data": [
              {
                "id": 1,
                "name": "스터디 채팅방",
                "lastMessage": "안녕하세요! 오늘 스터디 진행합니다.",
                "lastMessageAt": "2026-05-07T14:30:00",
                "unreadCount": 3,
                "memberCount": 5
              },
              {
                "id": 2,
                "name": "알고리즘 스터디",
                "lastMessage": null,
                "lastMessageAt": null,
                "unreadCount": 0,
                "memberCount": 2
              }
            ]
          }
  - name: 401 - 인증 필요
    request:
      url: "{{base_url}}/api/v1/chat/rooms"
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      body:
        type: json
        data: |-
          {
            "code": 401,
            "status": "UNAUTHORIZED",
            "message": "인증이 필요합니다.",
            "data": null
          }

docs: |-
  ## 채팅방 목록 조회

  현재 로그인한 사용자가 참여 중인 채팅방 목록을 조회합니다.
  각 채팅방의 마지막 메시지와 읽지 않은 메시지 수(Unread Count)를 포함합니다.

  ### 요청 헤더
  | 헤더 | 필수 | 설명 |
  |---|---|---|
  | Authorization | ✅ | `Bearer {accessToken}` |

  ### 성공 응답 (200 OK)
  ```json
  {
    "code": 200,
    "status": "SUCCESS",
    "message": "채팅방 목록 조회 성공",
    "data": [
      {
        "id": 1,
        "name": "스터디 채팅방",
        "lastMessage": "마지막 메시지 내용",
        "lastMessageAt": "2026-05-07T14:30:00",
        "unreadCount": 3,
        "memberCount": 5
      }
    ]
  }
  ```

  ### 응답 필드 설명
  | 필드 | 타입 | 설명 |
  |---|---|---|
  | id | number | 채팅방 ID |
  | name | string | 채팅방 이름 |
  | lastMessage | string \| null | 마지막 메시지 내용 (메시지 없을 시 null) |
  | lastMessageAt | string \| null | 마지막 메시지 발송 시각 (ISO 8601) |
  | unreadCount | number | 읽지 않은 메시지 수 |
  | memberCount | number | 현재 참여 중인 멤버 수 |

  ### 실패 응답
  | Status | code | 메시지 | 발생 원인 |
  |---|---|---|---|
  | 401 | UNAUTHORIZED | 인증이 필요합니다. | 토큰 없음 |
  | 401 | INVALID_TOKEN | 유효하지 않거나 만료된 토큰입니다. | 토큰 만료 |
