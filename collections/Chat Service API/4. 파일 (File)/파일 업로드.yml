info:
  name: 파일 업로드
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/api/v1/chat/rooms/:roomId/files"
  headers:
    - name: Authorization
      value: "Bearer {{access_token}}"
    - name: Content-Type
      value: multipart/form-data
  params:
    - name: roomId
      value: "1"
      type: path
      description: 파일을 업로드할 채팅방 ID
  body:
    type: multipartForm
    data:
      - name: file
        type: file
  auth: inherit

examples:
  - name: 200 - 업로드 성공
    request:
      url: "{{base_url}}/api/v1/chat/rooms/1/files"
      method: POST
      headers:
        - name: Authorization
          value: Bearer eyJhbGciOiJIUzI1NiJ9.EXAMPLE
        - name: Content-Type
          value: multipart/form-data
    response:
      status: 200
      statusText: OK
      body:
        type: json
        data: |-
          {
            "code": 200,
            "status": "SUCCESS",
            "message": "파일 업로드 성공",
            "data": {
              "id": 5,
              "roomId": 1,
              "fileName": "스터디자료.pdf",
              "fileUrl": "https://s3.amazonaws.com/stardy/files/스터디자료.pdf",
              "fileSize": 2097152,
              "mimeType": "application/pdf"
            }
          }
  - name: 400 - 파일 없음
    request:
      url: "{{base_url}}/api/v1/chat/rooms/1/files"
      method: POST
      headers:
        - name: Authorization
          value: Bearer eyJhbGciOiJIUzI1NiJ9.EXAMPLE
    response:
      status: 400
      statusText: Bad Request
      body:
        type: json
        data: |-
          {
            "code": 400,
            "status": "EMPTY_FILE",
            "message": "첨부된 파일이 없습니다.",
            "data": null
          }
  - name: 400 - 파일 크기 초과 (100MB 이상)
    request:
      url: "{{base_url}}/api/v1/chat/rooms/1/files"
      method: POST
      headers:
        - name: Authorization
          value: Bearer eyJhbGciOiJIUzI1NiJ9.EXAMPLE
        - name: Content-Type
          value: multipart/form-data
    response:
      status: 400
      statusText: Bad Request
      body:
        type: json
        data: |-
          {
            "code": 400,
            "status": "FILE_SIZE_EXCEEDED",
            "message": "파일 크기는 100MB를 초과할 수 없습니다.",
            "data": null
          }
  - name: 401 - 인증 필요
    request:
      url: "{{base_url}}/api/v1/chat/rooms/1/files"
      method: POST
    response:
      status: 401
      statusText: Unauthorized
      body:
        type: json
        data: |-
          {
            "code": 401,
            "status": "UNAUTHORIZED",
            "message": "인증이 필요합니다.",
            "data": null
          }
  - name: 403 - 채팅방 비멤버
    request:
      url: "{{base_url}}/api/v1/chat/rooms/1/files"
      method: POST
      headers:
        - name: Authorization
          value: Bearer eyJhbGciOiJIUzI1NiJ9.EXAMPLE
        - name: Content-Type
          value: multipart/form-data
    response:
      status: 403
      statusText: Forbidden
      body:
        type: json
        data: |-
          {
            "code": 403,
            "status": "NOT_ROOM_MEMBER",
            "message": "채팅방 멤버가 아닙니다.",
            "data": null
          }
  - name: 404 - 채팅방 없음
    request:
      url: "{{base_url}}/api/v1/chat/rooms/999/files"
      method: POST
      headers:
        - name: Authorization
          value: Bearer eyJhbGciOiJIUzI1NiJ9.EXAMPLE
    response:
      status: 404
      statusText: Not Found
      body:
        type: json
        data: |-
          {
            "code": 404,
            "status": "ROOM_NOT_FOUND",
            "message": "채팅방을 찾을 수 없습니다.",
            "data": null
          }

docs: |-
  ## 파일 업로드

  채팅방에서 공유할 파일을 서버 스토리지(S3 등)에 업로드합니다.
  해당 채팅방의 멤버만 파일을 업로드할 수 있습니다.
  업로드 성공 후 반환된 `fileId`를 WebSocket 메시지 발행 시 포함하여 파일 메시지를 전송합니다.
  최대 업로드 용량은 **100MB**이며, 초과 시 400 에러를 반환합니다.

  ### 요청 헤더
  | 헤더 | 필수 | 설명 |
  |---|---|---|
  | Authorization | ✅ | `Bearer {accessToken}` |
  | Content-Type | ✅ | `multipart/form-data` |

  ### Path Parameters
  | 파라미터 | 타입 | 필수 | 설명 |
  |---|---|---|---|
  | roomId | number | ✅ | 파일을 업로드할 채팅방 ID |

  ### 요청 바디 (multipart/form-data)
  | 필드 | 타입 | 필수 | 설명 |
  |---|---|---|---|
  | file | file | ✅ | 업로드할 파일 (최대 100MB) |

  ### 성공 응답 (200 OK)
  ```json
  {
    "code": 200,
    "status": "SUCCESS",
    "message": "파일 업로드 성공",
    "data": {
      "id": 5,
      "roomId": 1,
      "fileName": "스터디자료.pdf",
      "fileUrl": "https://s3.amazonaws.com/stardy/files/스터디자료.pdf",
      "fileSize": 2097152,
      "mimeType": "application/pdf"
    }
  }
  ```

  ### 응답 필드 설명
  | 필드 | 타입 | 설명 |
  |---|---|---|
  | id | number | 파일 ID (WebSocket 메시지 발행 시 사용) |
  | roomId | number | 업로드된 채팅방 ID |
  | fileName | string | 원본 파일명 |
  | fileUrl | string | 파일 접근 URL |
  | fileSize | number | 파일 크기 (bytes) |
  | mimeType | string | 파일 MIME 타입 |

  ### 실패 응답
  | Status | code | 메시지 | 발생 원인 |
  |---|---|---|---|
  | 400 | EMPTY_FILE | 첨부된 파일이 없습니다. | 파일 미첨부 |
  | 400 | FILE_SIZE_EXCEEDED | 파일 크기는 100MB를 초과할 수 없습니다. | 100MB 초과 파일 |
  | 400 | INVALID_FILE_TYPE | 지원하지 않는 파일 형식입니다. | 허용되지 않는 MIME 타입 |
  | 401 | UNAUTHORIZED | 인증이 필요합니다. | 토큰 없음 |
  | 403 | NOT_ROOM_MEMBER | 채팅방 멤버가 아닙니다. | 비멤버의 파일 업로드 시도 |
  | 404 | ROOM_NOT_FOUND | 채팅방을 찾을 수 없습니다. | 존재하지 않는 roomId |
