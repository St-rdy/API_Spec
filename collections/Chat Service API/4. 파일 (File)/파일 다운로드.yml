info:
  name: 파일 다운로드
  type: http
  seq: 2

http:
  method: GET
  url: "{{base_url}}/api/v1/chat/files/:fileId/download"
  headers:
    - name: Authorization
      value: "Bearer {{access_token}}"
  params:
    - name: fileId
      value: "1"
      type: path
      description: 다운로드할 파일 ID
  auth: inherit

examples:
  - name: 200 - 다운로드 성공
    request:
      url: "{{base_url}}/api/v1/chat/files/5/download"
      method: GET
      headers:
        - name: Authorization
          value: Bearer eyJhbGciOiJIUzI1NiJ9.EXAMPLE
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/pdf
        - name: Content-Disposition
          value: attachment; filename="스터디자료.pdf"
        - name: Content-Length
          value: "2097152"
      body:
        type: text
        data: "(binary file data)"
  - name: 403 - 채팅방 비멤버
    request:
      url: "{{base_url}}/api/v1/chat/files/5/download"
      method: GET
      headers:
        - name: Authorization
          value: Bearer eyJhbGciOiJIUzI1NiJ9.EXAMPLE
    response:
      status: 403
      statusText: Forbidden
      body:
        type: json
        data: |-
          {
            "code": 403,
            "status": "NOT_ROOM_MEMBER",
            "message": "채팅방 멤버가 아닙니다.",
            "data": null
          }
  - name: 404 - 파일 없음
    request:
      url: "{{base_url}}/api/v1/chat/files/999/download"
      method: GET
      headers:
        - name: Authorization
          value: Bearer eyJhbGciOiJIUzI1NiJ9.EXAMPLE
    response:
      status: 404
      statusText: Not Found
      body:
        type: json
        data: |-
          {
            "code": 404,
            "status": "FILE_NOT_FOUND",
            "message": "파일을 찾을 수 없습니다.",
            "data": null
          }

docs: |-
  ## 파일 다운로드

  채팅 메시지에 첨부된 파일을 바이너리 형태로 다운로드합니다.
  해당 파일이 공유된 채팅방의 멤버만 다운로드할 수 있습니다.
  MVP 단계에서 파일 저장 기간은 무제한입니다.

  ### 요청 헤더
  | 헤더 | 필수 | 설명 |
  |---|---|---|
  | Authorization | ✅ | `Bearer {accessToken}` |

  ### Path Parameters
  | 파라미터 | 타입 | 필수 | 설명 |
  |---|---|---|---|
  | fileId | number | ✅ | 다운로드할 파일 ID |

  ### 성공 응답 (200 OK)
  파일 바이너리를 응답 바디로 반환합니다.

  | 응답 헤더 | 설명 |
  |---|---|
  | Content-Type | 파일의 MIME 타입 (예: `application/pdf`, `image/png`) |
  | Content-Disposition | `attachment; filename="{원본파일명}"` |
  | Content-Length | 파일 크기 (bytes) |

  ### 실패 응답
  | Status | code | 메시지 | 발생 원인 |
  |---|---|---|---|
  | 401 | UNAUTHORIZED | 인증이 필요합니다. | 토큰 없음 |
  | 403 | NOT_ROOM_MEMBER | 채팅방 멤버가 아닙니다. | 비멤버의 파일 접근 시도 |
  | 404 | FILE_NOT_FOUND | 파일을 찾을 수 없습니다. | 존재하지 않는 fileId |
