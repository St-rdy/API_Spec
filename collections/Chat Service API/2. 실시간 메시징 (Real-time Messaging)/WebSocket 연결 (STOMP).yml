docs: |-
  ## WebSocket 연결 (STOMP)

  STOMP 프로토콜을 사용한 실시간 메시지 송수신 연결입니다.
  연결 후 채팅방별 토픽을 구독하여 실시간 메시지를 수신합니다.
  메시지 전송은 `메시지 전송` 문서를 참고하세요.

  ---

  ### 연결 및 인증 흐름

  > ⚠️ 브라우저 표준 WebSocket API는 커스텀 HTTP 헤더를 지원하지 않습니다.
  > 토큰은 WebSocket 연결 URL이 아닌, **STOMP CONNECT 프레임 헤더**에 포함하여 전달합니다.

  #### 1단계: WebSocket 연결
  ```
  ws://{host}/ws/chat
  ```
  커스텀 헤더 없이 순수 WebSocket 연결을 수립합니다.

  #### 2단계: STOMP CONNECT 프레임 전송
  WebSocket 연결 직후 아래 STOMP CONNECT 프레임을 전송합니다.
  서버는 이 프레임의 `Authorization` 헤더로 JWT를 검증합니다.

  ```
  CONNECT
  Authorization:Bearer {accessToken}
  accept-version:1.2
  heart-beat:10000,10000

  ^@
  ```

  #### 3단계: STOMP CONNECTED 응답 수신
  인증 성공 시 서버로부터 아래 프레임을 수신합니다.
  ```
  CONNECTED
  version:1.2
  heart-beat:10000,10000

  ^@
  ```

  #### 인증 실패 시
  토큰이 유효하지 않으면 서버는 STOMP ERROR 프레임 후 연결을 종료합니다.
  ```
  ERROR
  message:INVALID_TOKEN

  ^@
  ```

  ---

  ### STOMP 구독 (Subscribe)

  #### 채팅방 메시지 수신
  ```
  /topic/rooms/{roomId}
  ```
  채팅방의 실시간 메시지(TEXT, FILE, SYSTEM)와 삭제 처리된 메시지를 수신합니다.

  **수신 메시지 포맷 (TEXT/FILE):**
  ```json
  {
    "id": 101,
    "roomId": 1,
    "userId": 1,
    "nickname": "사용자닉네임",
    "profileUrl": "https://s3.amazonaws.com/stardy/profile1.jpg",
    "type": "TEXT",
    "content": "메시지 내용",
    "status": "ACTIVE",
    "fileId": null,
    "fileName": null,
    "fileUrl": null,
    "updatedAt": null,
    "createdAt": "2026-05-07T14:30:00Z"
  }
  ```

  #### 메시지 수정 이벤트 수신
  ```
  /topic/rooms/{roomId}/edit
  ```
  메시지가 수정됐을 때 모든 구독자에게 동기화됩니다.

  **수신 메시지 포맷:**
  ```json
  {
    "id": 101,
    "content": "수정된 메시지 내용",
    "status": "EDITED",
    "updatedAt": "2026-05-07T14:35:00Z"
  }
  ```

  #### 메시지 삭제 이벤트 수신
  ```
  /topic/rooms/{roomId}/delete
  ```
  메시지가 삭제됐을 때 모든 구독자에게 동기화됩니다.
  클라이언트는 해당 `id`의 메시지 내용을 "삭제된 메시지입니다."로 교체해야 합니다.

  **수신 메시지 포맷:**
  ```json
  {
    "id": 101,
    "status": "DELETED",
    "content": "삭제된 메시지입니다."
  }
  ```

  ---

  ### 메시지 타입 (type)
  | 값 | 설명 |
  |---|---|
  | TEXT | 일반 텍스트 메시지 |
  | FILE | 파일 첨부 메시지 |
  | SYSTEM | 시스템 메시지 (입장/퇴장 알림, 서버에서 자동 발행) |

  ### 메시지 상태 (status)
  | 값 | 설명 |
  |---|---|
  | ACTIVE | 정상 메시지 |
  | EDITED | 수정된 메시지 (프론트엔드에서 "(수정됨)" 표시, `updatedAt` 값 있음) |
  | DELETED | 삭제된 메시지 (`content`는 "삭제된 메시지입니다."로 반환) |

  ### SYSTEM 메시지 예시
  ```json
  {
    "id": 55,
    "roomId": 1,
    "userId": null,
    "nickname": null,
    "profileUrl": null,
    "type": "SYSTEM",
    "content": "홍길동 님이 입장하셨습니다.",
    "status": "ACTIVE",
    "fileId": null,
    "fileName": null,
    "fileUrl": null,
    "updatedAt": null,
    "createdAt": "2026-05-07T15:00:00Z"
  }
  ```

  ---

  ### Heartbeat 설정
  | 항목 | 값 | 설명 |
  |---|---|---|
  | 클라이언트 송신 주기 | 10000ms | 서버에 10초마다 ping |
  | 클라이언트 수신 주기 | 10000ms | 서버로부터 10초마다 pong 기대 |
  | 연결 끊김 감지 | ~30초 | heartbeat 3회 미수신 시 재연결 시도 |
