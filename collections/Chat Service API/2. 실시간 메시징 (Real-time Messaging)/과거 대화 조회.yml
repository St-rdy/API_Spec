docs: |-
  ## 과거 대화 조회 (커서 페이징)

  채팅방의 과거 메시지를 커서 기반으로 50개씩 조회합니다.
  `historyVisible` 설정에 따라 신규 멤버의 조회 범위가 제한됩니다.

  ### 요청 헤더
  | 헤더 | 필수 | 설명 |
  |---|---|---|
  | Authorization | ✅ | `Bearer {accessToken}` |

  ### Path Parameters
  | 파라미터 | 타입 | 필수 | 설명 |
  |---|---|---|---|
  | roomId | number | ✅ | 조회할 채팅방 ID |

  ### Query Parameters
  | 파라미터 | 타입 | 필수 | 설명 |
  |---|---|---|---|
  | cursor | number | ❌ | 마지막으로 받은 메시지 ID (생략 시 최신 메시지부터 조회) |
  | size | number | ❌ | 한 번에 로드할 메시지 수 (기본값: 50) |

  ---

  ### 읽음 처리 (자동)

  `cursor` 없이 첫 페이지를 조회할 때 서버가 자동으로 읽음 처리를 수행합니다.
  - `chat_participants.last_read_message_id`를 반환된 메시지 중 가장 큰 ID로 업데이트
  - 이후 `채팅방 목록 조회`에서 해당 방의 `unreadCount`가 0으로 반환됨
  - `cursor`가 있는 요청(스크롤 업으로 과거 메시지 로드)은 읽음 처리 하지 않음

  ---

  ### 이전 대화 노출 정책 (History Visibility)
  | historyVisible | 동작 |
  |---|---|
  | true | 신규 멤버 입장 시 입장 이전의 모든 메시지 조회 허용 |
  | false | 신규 멤버의 `joined_at` 이후 메시지만 응답 (쿼리 필터링 적용) |

  ---

  ### 정렬 방식 및 커서 방향
  - 메시지는 **ID 오름차순 (오래된 것부터)** 으로 반환됩니다. (채팅 UI 기준: 위가 오래된 메시지, 아래가 최신)
  - 첫 요청(`cursor` 생략) → 가장 최근 메시지 기준으로 `size`개 반환
  - 이후 요청 → `cursor`에 이전 응답의 `nextCursor` 값 전달 → 그 ID보다 오래된 메시지 추가 로드 (스크롤 업)

  ---

  ### 성공 응답 (200 OK)
  ```json
  {
    "code": 200,
    "status": "SUCCESS",
    "message": "메시지 목록 조회 성공",
    "data": {
      "messages": [ ... ],
      "nextCursor": 50,
      "hasMore": false
    }
  }
  ```

  ### 메시지 객체 필드
  | 필드 | 타입 | 설명 |
  |---|---|---|
  | id | number | 메시지 ID (`chat_messages.id`) |
  | roomId | number | 채팅방 ID |
  | userId | number \| null | 발신자 ID (SYSTEM 메시지는 null) |
  | nickname | string \| null | 발신자 닉네임 (SYSTEM 메시지는 null) |
  | profileUrl | string \| null | 발신자 프로필 URL (SYSTEM 메시지는 null) |
  | type | string | 메시지 타입: `TEXT` \| `FILE` \| `SYSTEM` |
  | content | string \| null | 메시지 내용 (FILE은 null, DELETED는 "삭제된 메시지입니다.") |
  | status | string | 메시지 상태: `ACTIVE` \| `EDITED` \| `DELETED` |
  | fileId | number \| null | 파일 ID (`chat_files.id`, FILE 타입만 값 있음) |
  | fileName | string \| null | 원본 파일명 (FILE 타입만 값 있음) |
  | fileUrl | string \| null | 파일 접근 URL (FILE 타입만 값 있음) |
  | updatedAt | string \| null | 수정 시각 (EDITED 상태일 때만 값 있음, 그 외 null) |
  | createdAt | string | 메시지 생성 시각 (ISO 8601 UTC) |

  ### 페이지 응답 필드
  | 필드 | 타입 | 설명 |
  |---|---|---|
  | messages | array | 메시지 목록 (ID 오름차순, 오래된 것부터) |
  | nextCursor | number \| null | 다음 페이지 커서 (반환된 메시지 중 가장 작은 ID, 더 없으면 null) |
  | hasMore | boolean | 더 오래된 메시지 존재 여부 |

  ---

  ### 실패 응답
  | Status | code | 메시지 | 발생 원인 |
  |---|---|---|---|
  | 401 | UNAUTHORIZED | 인증이 필요합니다. | 토큰 없음 |
  | 403 | NOT_ROOM_MEMBER | 채팅방 멤버가 아닙니다. | 비멤버 접근 시도 |
  | 404 | ROOM_NOT_FOUND | 채팅방을 찾을 수 없습니다. | 존재하지 않는 roomId |
