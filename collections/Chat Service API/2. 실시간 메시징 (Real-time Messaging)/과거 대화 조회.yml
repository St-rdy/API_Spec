info:
  name: 과거 대화 조회
  type: http
  seq: 3

http:
  method: GET
  url: "{{base_url}}/api/v1/chat/rooms/:roomId/messages"
  headers:
    - name: Authorization
      value: "Bearer {{access_token}}"
  params:
    - name: roomId
      value: "1"
      type: path
      description: 조회할 채팅방 ID
    - name: cursor
      value: ""
      type: query
      description: 마지막으로 받은 메시지 ID (첫 요청 시 생략)
    - name: size
      value: "50"
      type: query
      description: 한 번에 로드할 메시지 수 (기본 50)
  auth: inherit

examples:
  - name: 200 - 첫 페이지 조회 (cursor 없음, 읽음 처리 포함)
    request:
      url: "{{base_url}}/api/v1/chat/rooms/1/messages?size=50"
      method: GET
      headers:
        - name: Authorization
          value: Bearer eyJhbGciOiJIUzI1NiJ9.EXAMPLE
    response:
      status: 200
      statusText: OK
      body:
        type: json
        data: |-
          {
            "code": 200,
            "status": "SUCCESS",
            "message": "메시지 목록 조회 성공",
            "data": {
              "messages": [
                {
                  "id": 100,
                  "roomId": 1,
                  "userId": 2,
                  "nickname": "사용자닉네임",
                  "profileUrl": "https://s3.amazonaws.com/stardy/profile2.jpg",
                  "type": "TEXT",
                  "content": "안녕하세요!",
                  "status": "ACTIVE",
                  "fileId": null,
                  "fileName": null,
                  "fileUrl": null,
                  "updatedAt": null,
                  "createdAt": "2026-05-07T12:00:00Z"
                },
                {
                  "id": 101,
                  "roomId": 1,
                  "userId": null,
                  "nickname": null,
                  "profileUrl": null,
                  "type": "SYSTEM",
                  "content": "홍길동 님이 입장하셨습니다.",
                  "status": "ACTIVE",
                  "fileId": null,
                  "fileName": null,
                  "fileUrl": null,
                  "updatedAt": null,
                  "createdAt": "2026-05-07T13:00:00Z"
                }
              ],
              "nextCursor": 100,
              "hasMore": true
            }
          }
  - name: 200 - 커서 페이징 (더 오래된 메시지 로드, 읽음 처리 없음)
    request:
      url: "{{base_url}}/api/v1/chat/rooms/1/messages?cursor=100&size=50"
      method: GET
      headers:
        - name: Authorization
          value: Bearer eyJhbGciOiJIUzI1NiJ9.EXAMPLE
    response:
      status: 200
      statusText: OK
      body:
        type: json
        data: |-
          {
            "code": 200,
            "status": "SUCCESS",
            "message": "메시지 목록 조회 성공",
            "data": {
              "messages": [
                {
                  "id": 50,
                  "roomId": 1,
