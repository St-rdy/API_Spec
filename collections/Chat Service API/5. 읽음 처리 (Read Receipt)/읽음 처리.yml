info:
  name: 읽음 처리
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/api/v1/chat/rooms/:roomId/read"
  headers:
    - name: Authorization
      value: "Bearer {{access_token}}"
  params:
    - name: roomId
      value: "1"
      type: path
      description: 읽음 처리할 채팅방 ID
  auth: inherit

examples:
  - name: 200 - 읽음 처리 성공
    request:
      url: "{{base_url}}/api/v1/chat/rooms/1/read"
      method: POST
      headers:
        - name: Authorization
          value: Bearer eyJhbGciOiJIUzI1NiJ9.EXAMPLE
    response:
      status: 200
      statusText: OK
      body:
        type: json
        data: |-
          {
            "code": 200,
            "status": "SUCCESS",
            "message": "읽음 처리 완료",
            "data": {
              "roomId": 1,
              "unreadCount": 0
            }
          }
  - name: 403 - 채팅방 비멤버
    request:
      url: "{{base_url}}/api/v1/chat/rooms/1/read"
      method: POST
      headers:
        - name: Authorization
          value: Bearer eyJhbGciOiJIUzI1NiJ9.EXAMPLE
    response:
      status: 403
      statusText: Forbidden
      body:
        type: json
        data: |-
          {
            "code": 403,
            "status": "NOT_ROOM_MEMBER",
            "message": "채팅방 멤버가 아닙니다.",
            "data": null
          }
  - name: 404 - 채팅방 없음
    request:
      url: "{{base_url}}/api/v1/chat/rooms/999/read"
      method: POST
      headers:
        - name: Authorization
          value: Bearer eyJhbGciOiJIUzI1NiJ9.EXAMPLE
    response:
      status: 404
      statusText: Not Found
      body:
        type: json
        data: |-
          {
            "code": 404,
            "status": "ROOM_NOT_FOUND",
            "message": "채팅방을 찾을 수 없습니다.",
            "data": null
          }

docs: |-
  ## 읽음 처리

  채팅방의 읽지 않은 메시지를 모두 읽음 상태로 변경하고 `unreadCount`를 0으로 초기화합니다.

  ### 호출 시점
  - 사용자가 채팅방을 **열었을 때** (채팅방 화면 진입 시)
  - 사용자가 메시지 목록을 **최하단으로 스크롤했을 때**

  ### 요청 헤더
  | 헤더 | 필수 | 설명 |
  |---|---|---|
  | Authorization | ✅ | `Bearer {accessToken}` |

  ### Path Parameters
  | 파라미터 | 타입 | 필수 | 설명 |
  |---|---|---|---|
  | roomId | number | ✅ | 읽음 처리할 채팅방 ID |

  ### 성공 응답 (200 OK)
  ```json
  {
    "code": 200,
    "status": "SUCCESS",
    "message": "읽음 처리 완료",
    "data": {
      "roomId": 1,
      "unreadCount": 0
    }
  }
  ```

  ### 동작 방식
  - `chat_participants.last_read_message_id`를 해당 채팅방의 최신 메시지 ID로 업데이트합니다.
  - 이후 `채팅방 목록 조회` API에서 해당 방의 `unreadCount`가 0으로 반환됩니다.

  ### 실패 응답
  | Status | code | 메시지 | 발생 원인 |
  |---|---|---|---|
  | 401 | UNAUTHORIZED | 인증이 필요합니다. | 토큰 없음 |
  | 403 | NOT_ROOM_MEMBER | 채팅방 멤버가 아닙니다. | 비멤버 접근 시도 |
  | 404 | ROOM_NOT_FOUND | 채팅방을 찾을 수 없습니다. | 존재하지 않는 roomId |
