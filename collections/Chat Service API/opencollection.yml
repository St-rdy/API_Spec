docs:
  content: |-
    # Chat Service API 명세서

    ## 개요

    채팅방 관리, 실시간 메시징, 멤버 권한, 파일 공유를 위한 API입니다.
    JWT 기반의 인증을 사용하며, 모든 HTTP 요청은 `ApiResponse` 공통 포맷으로 응답합니다.
    실시간 메시지 송수신은 WebSocket(STOMP) 프로토콜을 사용합니다.

    ---

    ## 기술 스택

    | 항목 | 내용 |
    | --- | --- |
    | Language | Java 21 |
    | Framework | Spring Boot 3.4.x |
    | Database | PostgreSQL |
    | Realtime | WebSocket + STOMP (Spring Messaging) |
    | Security | Spring Security, JJWT |
    | Storage | AWS S3 (또는 로컬 스토리지) |

    ---

    ## 전체 API 목록

    ### 채팅방 관리 (Room Management)

    | 메서드 | URL | 설명 |
    | --- | --- | --- |
    | POST | /api/v1/chat/rooms | 채팅방 생성 |
    | GET | /api/v1/chat/rooms | 채팅방 목록 조회 |
    | GET | /api/v1/chat/rooms/{roomId} | 채팅방 상세 조회 |
    | PATCH | /api/v1/chat/rooms/{roomId}/settings | 채팅방 설정 수정 |
    | DELETE | /api/v1/chat/rooms/{roomId} | 채팅방 삭제 |

    ### 실시간 메시징 (Real-time Messaging)

    | 메서드 | URL | 설명 |
    | --- | --- | --- |
    | WS | ws://host/ws/chat | WebSocket 연결 (STOMP) |
    | STOMP SEND | /app/rooms/{roomId}/message | 메시지 전송 (텍스트/파일) |
    | GET | /api/v1/chat/rooms/{roomId}/messages | 과거 대화 조회 (커서 페이징) |
    | PATCH | /api/v1/chat/messages/{messageId} | 메시지 수정 |
    | DELETE | /api/v1/chat/messages/{messageId} | 메시지 삭제 (논리 삭제) |

    ### 멤버 및 접근 권한 (Member & Access)

    | 메서드 | URL | 설명 |
    | --- | --- | --- |
    | POST | /api/v1/chat/rooms/{roomId}/join | 채팅방 입장 |
    | DELETE | /api/v1/chat/rooms/{roomId}/leave | 채팅방 퇴장 |

    ### 파일 (File)

    | 메서드 | URL | 설명 |
    | --- | --- | --- |
    | POST | /api/v1/chat/rooms/{roomId}/files | 파일 업로드 |
    | GET | /api/v1/chat/files/{fileId}/download | 파일 다운로드 |

    ### 읽음 처리 (Read Receipt)

    | 메서드 | URL | 설명 |
    | --- | --- | --- |
    | POST | /api/v1/chat/rooms/{roomId}/read | 읽음 처리 (unreadCount 초기화) |

    ---

    ## Board Service 연동 정책

    Chat Service의 채팅방·멤버 생명주기는 Board Service의 스터디 그룹과 완전 동기화됩니다.
    아래 이벤트 발생 시 Board Service가 Chat Service API를 자동으로 호출합니다.

    | Board Service 이벤트 | Chat Service 자동 호출 | 비고 |
    | --- | --- | --- |
    | 스터디 그룹 생성 | `POST /api/v1/chat/rooms` | 채팅방 자동 생성 |
    | 스터디 그룹 이름 수정 | `PATCH /api/v1/chat/rooms/{roomId}/settings` (내부) | 채팅방 이름 자동 동기화 |
    | 스터디 그룹 멤버 가입 | `POST /api/v1/chat/rooms/{roomId}/join` | 채팅방 자동 입장 |
    | 스터디 그룹 멤버 탈퇴 / 강퇴 | `DELETE /api/v1/chat/rooms/{roomId}/leave` | 채팅방 자동 퇴장 |
    | 스터디 그룹 삭제 | `DELETE /api/v1/chat/rooms/{roomId}` | 채팅방 및 전체 데이터 삭제 |

    > 채팅방 이름은 항상 스터디 그룹 이름과 동기화되므로 `채팅방 생성` 및 `채팅방 설정 수정` API에서 `name` 필드를 입력받지 않습니다.

    ---

    ## 메시지 상태 (status)

    채팅 메시지는 `status` 필드 하나로 상태를 관리합니다 (`chat_messages.status`).

    | status | 설명 | content 반환값 | updatedAt |
    | --- | --- | --- | --- |
    | ACTIVE | 정상 메시지 | 원본 내용 | null |
    | EDITED | 수정된 메시지 | 수정된 내용 | 수정 시각 |
    | DELETED | 삭제된 메시지 (논리 삭제) | "삭제된 메시지입니다." | null |

    ---

    ## 공통 규칙

    ### 인증 헤더

    인증이 필요한 모든 API에 아래 헤더를 포함해야 합니다.

    ```
    Authorization: Bearer {accessToken}
    ```

    ### 공통 응답 포맷

    ```json
    {
      "code": 200,
      "status": "SUCCESS",
      "message": "성공 메시지",
      "data": { ... }
    }
    ```

    ### 공통 에러 응답 포맷

    ```json
    {
      "code": 401,
      "status": "UNAUTHORIZED",
      "message": "인증이 필요합니다.",
      "data": null
    }
    ```

    ---

    ## 에러 코드 전체 목록

    | code | status | 메시지 | 발생 시점 |
    | --- | --- | --- | --- |
    | 400 | MISSING_FIELDS | 필수 필드 누락 | 필수 필드 누락 |
    | 400 | INVALID_FIELD | 유효하지 않은 필드값 | 유효하지 않은 필드값 |
    | 400 | CONTENT_REQUIRED | 메시지 내용을 입력해주세요. | 메시지 내용 미입력 |
    | 400 | MESSAGE_NOT_EDITABLE | 수정할 수 없는 메시지입니다. | FILE 타입 메시지 수정 시도 |
    | 400 | ALREADY_JOINED | 이미 입장한 채팅방입니다. | 채팅방 중복 입장 시도 |
    | 400 | EMPTY_FILE | 첨부된 파일이 없습니다. | 첨부 파일 없음 |
    | 400 | FILE_SIZE_EXCEEDED | 파일 크기는 100MB를 초과할 수 없습니다. | 파일 100MB 초과 |
    | 400 | INVALID_FILE_TYPE | 지원하지 않는 파일 형식입니다. | 지원하지 않는 파일 형식 |
    | 401 | UNAUTHORIZED | 인증이 필요합니다. | 인증 필요 |
    | 401 | INVALID_TOKEN | 유효하지 않거나 만료된 토큰입니다. | 유효하지 않은 토큰 |
    | 403 | FORBIDDEN | 권한이 없습니다. | 권한 없음 |
    | 403 | NOT_ROOM_OWNER | 채팅방 방장만 수정할 수 있습니다. | 방장이 아닌 사용자의 설정 수정 시도 |
    | 403 | NOT_ROOM_MEMBER | 채팅방 멤버가 아닙니다. | 비멤버의 채팅방/메시지 접근 시도 |
    | 403 | MESSAGE_ACCESS_DENIED | 본인의 메시지만 수정/삭제할 수 있습니다. | 타인 메시지 수정/삭제 시도 |
    | 403 | NOT_STUDY_GROUP_MEMBER | 해당 스터디 그룹의 멤버가 아닙니다. | 스터디 그룹 비멤버의 채팅방 생성 시도 |
    | 404 | ROOM_NOT_FOUND | 채팅방을 찾을 수 없습니다. | 존재하지 않는 roomId |
    | 404 | MESSAGE_NOT_FOUND | 메시지를 찾을 수 없습니다. | 존재하지 않는 messageId |
    | 404 | FILE_NOT_FOUND | 파일을 찾을 수 없습니다. | 존재하지 않는 fileId |
    | 404 | STUDY_GROUP_NOT_FOUND | 스터디 그룹을 찾을 수 없습니다. | 존재하지 않는 studyGroupId |
    | 500 | DB_ERROR | 데이터베이스 조회 중 오류가 발생했습니다. | 서버 내부 오류 |
  type: text/markdown
